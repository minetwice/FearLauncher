name: Completely Replace styles.xml

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  replace-styles:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Write new styles.xml
        run: |
          cat > app_pojavlauncher/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <!-- Base app theme -->
              <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/control_button_color</item>
                  <item name="colorPrimaryDark">@color/background_status_bar</item>
                  <item name="colorAccent">@color/icon_outline_color</item>
                  <item name="android:windowBackground">@color/background_app</item>
              </style>
              
              <!-- Rounded button style with ripple -->
              <style name="RoundedButton" parent="Widget.AppCompat.Button">
                  <item name="android:background">@drawable/btn_silver_ripple</item>
                  <item name="android:textColor">@color/primary_text</item>
                  <item name="android:textSize">14sp</item>
                  <item name="android:padding">12dp</item>
                  <item name="android:minHeight">48dp</item>
              </style>
              
              <!-- Other existing styles from original (if needed) -->
              <style name="ControlButton">
                  <item name="android:layout_width">wrap_content</item>
                  <item name="android:layout_height">wrap_content</item>
                  <item name="android:padding">8dp</item>
                  <item name="android:textColor">@color/primary_text</item>
              </style>
          </resources>
          EOF
          echo "✅ styles.xml overwritten with clean version"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/styles.xml
          git diff --cached --quiet || git commit -m "Replace styles.xml with clean well-formed version"
          git push origin HEAD:${GITHUB_REF_NAME}
