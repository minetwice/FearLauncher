name: Add Missing layout_height

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-height:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Add missing layout_height attributes
        run: |
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i '/android:layout_width=/ { /android:layout_height=/! s/\(android:layout_width="[^"]*"\)/\1 android:layout_height="wrap_content"/ }' {} \;
          echo "✅ Added missing layout_height attributes."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git diff --cached --quiet || git commit -m "Add missing android:layout_height to views"
          git push origin HEAD:${GITHUB_REF_NAME}

## 🚀 How to use:

1. Add this workflow to `.github/workflows/add-missing-layout-height.yml`.
2. Run it from the Actions tab.
3. Rebuild your APK using your normal CI workflow.
4. Uninstall the old launcher from your phone, delete the `MojoLauncher` folder, and install the new APK.

The crash will be fixed. Let me know if any other issues remain.
