name: Add Missing Divider Styles

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-styles:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Append missing styles to styles.xml
        run: |
          STYLES="app_pojavlauncher/src/main/res/values/styles.xml"
          
          # Create temp file with new styles
          cat > /tmp/divider_styles.txt << 'EOF'
          
          <style name="ThickDivider">
              <item name="android:layout_width">match_parent</item>
              <item name="android:layout_height">2dp</item>
              <item name="android:background">@color/divider</item>
          </style>
          
          <style name="LauncherFragment_Divider" parent="ThickDivider">
              <item name="android:layout_marginTop">8dp</item>
              <item name="android:layout_marginBottom">8dp</item>
          </style>
          EOF
          
          # Insert before </resources>
          sed -i "/<\/resources>/r /tmp/divider_styles.txt" "$STYLES"
          
          echo "✅ Added missing divider styles"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/styles.xml
          git diff --cached --quiet || git commit -m "Add ThickDivider and LauncherFragment_Divider styles"
          git push origin HEAD:${GITHUB_REF_NAME}
