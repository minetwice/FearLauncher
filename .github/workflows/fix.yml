name: Fix Overlay - Remove Divider, Add Gear, Convert Buttons to Icons

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Modify overlay layout with sed
        run: |
          LAYOUT="app_pojavlauncher/src/main/res/layout/activity_java_gui_launcher.xml"

          # 1. Remove the divider View (looks like a View with height 1dp/2dp and divider background)
          sed -i '/<View.*android:layout_height="[12]dp".*android:background="@color\/divider"/d' "$LAYOUT"
          sed -i '/<View.*android:layout_height="[12]dip".*android:background="@color\/divider"/d' "$LAYOUT"
          sed -i '/<View.*android:background="@color\/divider".*android:layout_height="[12]dp"/d' "$LAYOUT"
          sed -i '/<View.*android:layout_height="[12]dp".*android:background="#e0e0e0"/d' "$LAYOUT"
          sed -i '/<View.*android:background="#e0e0e0".*android:layout_height="[12]dp"/d' "$LAYOUT"
          echo "✅ Divider removed"

          # 2. Add gear icon at the very beginning (after the opening LinearLayout)
          # Check if LinearLayout exists and doesn't already have gear
          if ! grep -q "ic_gear" "$LAYOUT"; then
            sed -i 's|<LinearLayout[^>]*>|&\n    <!-- Gear icon -->\n    <ImageButton\n        android:layout_width="wrap_content"\n        android:layout_height="wrap_content"\n        android:src="@drawable/ic_gear"\n        android:background="?attr/selectableItemBackground"\n        android:padding="8dp"\n        android:contentDescription="Settings" />|' "$LAYOUT"
            echo "✅ Gear icon added"
          else
            echo "Gear icon already exists"
          fi

          # 3. Convert text buttons to ImageButtons with icons
          # Map of button text -> icon drawable
          # DEBUG -> ic_debug, CHAT -> ic_chat, KEYBOARD -> ic_keyboard, TAB -> ic_tab
          # MOUSE -> ic_mouse, 3RD -> ic_3rd, PRI -> ic_pri, SEC -> ic_sec
          # GUI -> ic_gui, INV -> ic_inv
          sed -i 's|<Button[^>]*android:text="DEBUG"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_debug" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="DEBUG" />|g' "$LAYOUT"
          sed -i 's|<Button[^>]*android:text="CHAT"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_chat" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="CHAT" />|g' "$LAYOUT"
          sed -i 's|<Button[^>]*android:text="KEYBOARD"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_keyboard" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="KEYBOARD" />|g' "$LAYOUT"
          sed -i 's|<Button[^>]*android:text="TAB"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_tab" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="TAB" />|g' "$LAYOUT"
          sed -i 's|<Button[^>]*android:text="MOUSE"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_mouse" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="MOUSE" />|g' "$LAYOUT"
          sed -i 's|<Button[^>]*android:text="3RD"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_3rd" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="3RD" />|g' "$LAYOUT"
          sed -i 's|<Button[^>]*android:text="PRI"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_pri" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="PRI" />|g' "$LAYOUT"
          sed -i 's|<Button[^>]*android:text="SEC"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_sec" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="SEC" />|g' "$LAYOUT"
          sed -i 's|<Button[^>]*android:text="GUI"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_gui" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="GUI" />|g' "$LAYOUT"
          sed -i 's|<Button[^>]*android:text="INV"[^>]*>|<ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_inv" android:background="?attr/selectableItemBackground" android:padding="8dp" android:contentDescription="INV" />|g' "$LAYOUT"
          echo "✅ Converted buttons to icons"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/activity_java_gui_launcher.xml
          git diff --cached --quiet || git commit -m "Overlay: remove divider, add gear, convert buttons to icons"
          git push origin HEAD:${GITHUB_REF_NAME}
