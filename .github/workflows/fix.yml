name: Fix Theme Parent

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-theme:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Replace themes.xml with valid AppCompat theme
        run: |
          cat > app_pojavlauncher/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/control_button_color</item>
                  <item name="colorPrimaryDark">@color/background_status_bar</item>
                  <item name="colorAccent">@color/icon_outline_color</item>
                  <item name="android:windowBackground">@color/background_app</item>
              </style>
          </resources>
          EOF
          echo "✅ Replaced theme with AppCompat parent"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/themes.xml
          git diff --cached --quiet || git commit -m "Fix theme parent: use AppCompat instead of MaterialComponents"
          git push origin HEAD:${GITHUB_REF_NAME}
