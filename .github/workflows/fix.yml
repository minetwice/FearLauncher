name: Delete .bak File Directly

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove the specific .bak file
        run: |
          if [ -f "app_pojavlauncher/src/main/res/layout/fragment_launcher.xml.bak" ]; then
            rm "app_pojavlauncher/src/main/res/layout/fragment_launcher.xml.bak"
            echo "Deleted fragment_launcher.xml.bak"
          else
            echo "File not found"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Delete fragment_launcher.xml.bak"
          git push origin HEAD:${GITHUB_REF_NAME}
