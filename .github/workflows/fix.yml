name: Add Missing Vector Icons (Gear & Mouse)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. Create gear icon vector
      - name: Create gear icon vector
        run: |
          cat > app_pojavlauncher/src/main/res/drawable/ic_gear.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="@color/primary_text"
                  android:pathData="M19.14,12.94a7.07,7.07 0 0,0 0,-1.88l2.03,-1.58a0.49,0.49 0 0,0 0.12,-0.61l-1.92,-3.32a0.49,0.49 0 0,-0.59,-0.22l-2.39,0.96a7.04,7.04 0 0,0 -1.62,-0.94l-0.36,-2.54a0.48,0.48 0 0,0 -0.48,-0.41h-3.84a0.48,0.48 0 0,0 -0.48,0.41l-0.36,2.54a7.04,7.04 0 0,0 -1.62,0.94l-2.39,-0.96a0.49,0.49 0 0,0 -0.59,0.22l-1.92,3.32a0.49,0.49 0 0,0 0.12,0.61l2.03,1.58a7.07,7.07 0 0,0 0,1.88l-2.03,1.58a0.49,0.49 0 0,0 -0.12,0.61l1.92,3.32a0.49,0.49 0 0,0 0.59,0.22l2.39,-0.96a7.04,7.04 0 0,0 1.62,0.94l0.36,2.54a0.48,0.48 0 0,0 0.48,0.41h3.84a0.48,0.48 0 0,0 0.48,-0.41l0.36,-2.54a7.04,7.04 0 0,0 1.62,-0.94l2.39,0.96a0.49,0.49 0 0,0 0.59,-0.22l1.92,-3.32a0.49,0.49 0 0,0 -0.12,-0.61l-2.03,-1.58zM12,15.6A3.6,3.6 0 1,1 15.6,12 3.6,3.6 0 0,1 12,15.6z"/>
          </vector>
          EOF
          echo "✅ Gear icon created"

      # 2. Create mouse pointer vector
      - name: Create mouse pointer vector
        run: |
          cat > app_pojavlauncher/src/main/res/drawable/ic_mouse_pointer.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="@color/primary_text"
                  android:pathData="M4,4 L10,20 L13.5,13.5 L20,10 L4,4z" />
          </vector>
          EOF
          echo "✅ Mouse pointer created"

      # 3. Update any layout references (if they used .png)
      - name: Update layout references to use new vectors
        run: |
          # Replace any reference to ic_gear.png with ic_gear (without extension)
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i 's|@drawable/ic_gear.png|@drawable/ic_gear|g' {} \;
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i 's|@drawable/ic_mouse_pointer.png|@drawable/ic_mouse_pointer|g' {} \;
          # Also in other XML files (drawable, menu)
          find app_pojavlauncher/src/main/res -name "*.xml" -exec sed -i 's|@drawable/ic_gear.png|@drawable/ic_gear|g' {} \;
          find app_pojavlauncher/src/main/res -name "*.xml" -exec sed -i 's|@drawable/ic_mouse_pointer.png|@drawable/ic_mouse_pointer|g' {} \;
          echo "✅ Updated references"

      # 4. Ensure the gear button appears in the correct layout (if not already)
      - name: Verify gear button exists in in-game menu
        run: |
          # If there's a layout for the in-game menu, ensure it has the gear icon
          # Assuming the gear button is in a layout like 'activity_game.xml' or similar
          # We'll just add a fallback: if no gear button, we add one
          GAME_LAYOUT=$(find app_pojavlauncher/src/main/res/layout -name "activity_game*.xml" | head -1)
          if [ -n "$GAME_LAYOUT" ]; then
            if ! grep -q "ic_gear" "$GAME_LAYOUT"; then
              # Add a simple ImageButton with gear icon
              sed -i '/<\/LinearLayout>/i\
            <ImageButton android:layout_width="wrap_content" android:layout_height="wrap_content" android:src="@drawable/ic_gear" android:onClick="showSettings" />' "$GAME_LAYOUT"
            fi
          fi
          echo "✅ Verified gear button"

      # 5. Commit all changes
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/drawable/ic_gear.xml
          git add app_pojavlauncher/src/main/res/drawable/ic_mouse_pointer.xml
          git add app_pojavlauncher/src/main/res/layout/
          git diff --cached --quiet || git commit -m "Add vector gear and mouse icons, fix missing icons"
          git push origin HEAD:${GITHUB_REF_NAME}
