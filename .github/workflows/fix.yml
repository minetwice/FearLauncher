name: Add In-Game Overlay Icons (Vector)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-icons:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Create vector icons for overlay buttons
        run: |
          # List of icon names
          icons=("debug" "chat" "keyboard" "tab" "mouse" "3rd" "pri" "sec" "gui" "inv")
          for icon in "${icons[@]}"; do
            cat > app_pojavlauncher/src/main/res/drawable/ic_${icon}.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="@color/primary_text"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10-4.48 10-10S17.52,2 12,2zm-2,15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
          </vector>
          EOF
            # Rename file with correct icon name (replace placeholder with actual)
            mv app_pojavlauncher/src/main/res/drawable/ic_${icon}.xml app_pojavlauncher/src/main/res/drawable/ic_${icon}.tmp
            sed "s/ic_placeholder/ic_${icon}/g" app_pojavlauncher/src/main/res/drawable/ic_${icon}.tmp > app_pojavlauncher/src/main/res/drawable/ic_${icon}.xml
            rm app_pojavlauncher/src/main/res/drawable/ic_${icon}.tmp
            echo "Created ic_${icon}.xml"
          done

      # Alternative: specific icons with recognizable shapes
      - name: Create more specific icon shapes
        run: |
          # Chat bubble
          cat > app_pojavlauncher/src/main/res/drawable/ic_chat.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="@color/primary_text"
                  android:pathData="M20,2H4c-1.1,0-2,0.9-2,2v18l4-4h14c1.1,0,2-0.9,2-2V4c0-1.1-0.9-2-2-2z"/>
          </vector>
          EOF
          # Keyboard
          cat > app_pojavlauncher/src/main/res/drawable/ic_keyboard.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="@color/primary_text"
                  android:pathData="M20,5H4c-1.1,0-1.99,0.9-1.99,2L2,17c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V7c0-1.1-0.9-2-2-2zM11,8h2v2h-2V8zM8,8h2v2H8V8zM5,8h2v2H5V8zM8,13h8v2H8V13zM19,15h-2v-2h2V15zM19,11h-2V9h2V11z"/>
          </vector>
          EOF
          # Mouse
          cat > app_pojavlauncher/src/main/res/drawable/ic_mouse.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="@color/primary_text"
                  android:pathData="M13,1.07V9h7c0-4.08-3.05-7.44-7-7.93zM4,15c0,4.42,3.58,8,8,8s8-3.58,8-8v-4H4v4zM11,1.07C7.05,1.56,4,4.92,4,9h7V1.07z"/>
          </vector>
          EOF
          # Inventory (chest)
          cat > app_pojavlauncher/src/main/res/drawable/ic_inv.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="@color/primary_text"
                  android:pathData="M4,20h16V8H4v12zM8,10h2v2H8v-2zM8,14h2v2H8v-2zM14,10h2v2h-2v-2zM14,14h2v2h-2v-2zM4,6h16V4H4v2z"/>
          </vector>
          EOF

      - name: Remove any references to .png versions
        run: |
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i 's/@drawable\/ic_\([a-z0-9]*\)\.png/@drawable\/ic_\1/g' {} \;
          find app_pojavlauncher/src/main/res/drawable -name "*.xml" -exec sed -i 's/@drawable\/ic_\([a-z0-9]*\)\.png/@drawable\/ic_\1/g' {} \;

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/drawable/
          git diff --cached --quiet || git commit -m "Add vector overlay icons (debug, chat, keyboard, etc.)"
          git push origin HEAD:${GITHUB_REF_NAME}
