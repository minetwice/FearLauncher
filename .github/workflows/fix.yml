name: Ultimate Fix - Kotlin & Theme Restoration

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ultimate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. Restore colors with proper contrast (light background, dark text)
      - name: Restore silver/white theme with dark text
        run: |
          cat > app_pojavlauncher/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="background_app">#f5f5f5</color>
              <color name="background_status_bar">#e0e0e0</color>
              <color name="background_bottom_bar">#ffffff</color>
              <color name="primary_text">#212121</color>
              <color name="secondary_text">#757575</color>
              <color name="control_button_color">#9e9e9e</color>
              <color name="control_button_pressed_color">#bdbdbd</color>
              <color name="divider">#e0e0e0</color>
              <color name="icon_outline_color">#616161</color>
          </resources>
          EOF

      # 2. Force landscape orientation (manifest + activity)
      - name: Set landscape orientation
        run: |
          MANIFEST="app_pojavlauncher/src/main/AndroidManifest.xml"
          sed -i '/<activity android:name="net.kdt.pojavlaunch.LauncherActivity"/ s/android:screenOrientation="[^"]*"/android:screenOrientation="landscape"/' "$MANIFEST"
          JAVA="app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/LauncherActivity.java"
          if grep -q "onCreate" "$JAVA"; then
            sed -i '/super.onCreate/a\
            setRequestedOrientation(android.content.pm.ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);' "$JAVA"
          fi

      # 3. Add button click animations (scale + ripple)
      - name: Add button animations
        run: |
          mkdir -p app_pojavlauncher/src/main/res/anim
          cat > app_pojavlauncher/src/main/res/anim/button_scale.xml << 'EOF'
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <objectAnimator android:propertyName="scaleX" android:duration="100" android:valueTo="0.96" android:valueType="floatType"/>
              <objectAnimator android:propertyName="scaleY" android:duration="100" android:valueTo="0.96" android:valueType="floatType"/>
          </set>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/btn_silver_rounded.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/control_button_color"/>
              <corners android:radius="16dp"/>
          </shape>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/btn_silver_ripple.xml << 'EOF'
          <ripple xmlns:android="http://schemas.android.com/apk/res/android" android:color="@color/primary_text">
              <item android:drawable="@drawable/btn_silver_rounded"/>
          </ripple>
          EOF
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i 's/<Button /<Button android:background="@drawable\/btn_silver_ripple" android:stateListAnimator="@anim\/button_scale" /g' {} \;

      # 4. Fix version list visibility and data loading (Kotlin helper)
      - name: Create Kotlin version fixer
        run: |
          mkdir -p app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/kotlin
          cat > app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/kotlin/VersionListFix.kt << 'EOF'
          package net.kdt.pojavlaunch.kotlin

          import android.os.Handler
          import android.os.Looper
          import android.view.View
          import android.widget.ListView
          import androidx.fragment.app.Fragment
          import java.net.HttpURLConnection
          import java.net.URL

          object VersionListFix {
              fun ensureListVisible(fragment: Fragment, listId: Int = android.R.id.list) {
                  Handler(Looper.getMainLooper()).postDelayed({
                      fragment.view?.findViewById<ListView>(listId)?.visibility = View.VISIBLE
                  }, 500)
              }

              fun fetchWithUserAgent(url: String, callback: (String) -> Unit) {
                  Thread {
                      try {
                          val conn = URL(url).openConnection() as HttpURLConnection
                          conn.setRequestProperty("User-Agent", "FearLauncher/2.0 (Android; Mobile)")
                          conn.connectTimeout = 10000
                          val result = conn.inputStream.bufferedReader().use { it.readText() }
                          Handler(Looper.getMainLooper()).post { callback(result) }
                      } catch (e: Exception) { e.printStackTrace() }
                  }.start()
              }
          }
          EOF

      # 5. Apply the Kotlin fix to the version fragment
      - name: Patch version fragment to use Kotlin helper
        run: |
          VERSION_FRAGMENT=$(find app_pojavlauncher/src/main/java -name "*VersionListFragment*.java" -o -name "*VersionFragment*.java" | head -1)
          if [ -n "$VERSION_FRAGMENT" ]; then
            sed -i '/onViewCreated/a\
            net.kdt.pojavlaunch.kotlin.VersionListFix.ensureListVisible(this);' "$VERSION_FRAGMENT"
          fi
          # Also ensure the list view is not empty
          find app_pojavlauncher/src/main/res/layout -name "*version*.xml" -exec sed -i 's/android:layout_height="[^"]*"/android:layout_height="match_parent"/g' {} \;

      # 6. Set text colors to dark for contrast
      - name: Fix text colors
        run: |
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i 's/android:textColor="#[^"]*"/android:textColor="@color\/primary_text"/g' {} \;
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i 's/android:textColor="@color\/white"/android:textColor="@color\/primary_text"/g' {} \;

      # 7. Add missing background_status_bar
      - name: Ensure all color attributes exist
        run: |
          cat >> app_pojavlauncher/src/main/res/values/colors.xml << 'EOF'
              <color name="background_overlay">#eeeeee</color>
          EOF

      # 8. Commit all changes
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/
          git diff --cached --quiet || git commit -m "Ultimate fix: Kotlin helper, version list visibility, landscape, animations, contrast colors"
          git push origin HEAD:${GITHUB_REF_NAME}
