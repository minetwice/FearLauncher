name: Fix All Duplicate Attributes & Strings

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-all:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicate layout_height from all layout files (strong regex)
        run: |
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -print0 | while IFS= read -r -d '' file; do
            # Remove duplicate android:layout_height attributes: keep the first occurrence
            sed -i -E 's/(android:layout_height="[^"]*")\s+android:layout_height="[^"]*"/\1/g' "$file"
            # Also handle cases where they are adjacent without space (unlikely but for safety)
            sed -i -E 's/(android:layout_height="[^"]*")android:layout_height="[^"]*"/\1/g' "$file"
            echo "Processed $file"
          done
          echo "✅ Duplicate layout_height removed."

      - name: Fix string formatting for bind_process_waiting_joystick
        run: |
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i 's/<string name="bind_process_waiting_joystick">/<string formatted="false" name="bind_process_waiting_joystick">/g' {} \;
          echo "✅ Fixed string."

      - name: Delete any leftover .bak files
        run: |
          find app_pojavlauncher/src/main/res -type f -name "*.bak" -delete
          echo "✅ Removed .bak files."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          git diff --cached --quiet || git commit -m "Remove all duplicate layout_height attributes and fix string warning"
          git push origin HEAD:${GITHUB_REF_NAME}
