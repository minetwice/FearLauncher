name: Remove Duplicate AppTheme from styles.xml

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Delete AppTheme block from styles.xml
        run: |
          STYLES="app_pojavlauncher/src/main/res/values/styles.xml"
          # Remove lines from <style name="AppTheme" to </style>
          sed -i '/<style name="AppTheme"/,/<\/style>/d' "$STYLES"
          echo "✅ Removed AppTheme from styles.xml"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/styles.xml
          git diff --cached --quiet || git commit -m "Remove duplicate AppTheme from styles.xml (keep themes.xml)"
          git push origin HEAD:${GITHUB_REF_NAME}
