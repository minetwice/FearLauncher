name: Fix Missing Colors

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-colors:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Add missing colors to colors.xml
        run: |
          cat > app_pojavlauncher/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <!-- Black & Silver Theme -->
              <color name="control_button_color">#808080</color>
              <color name="control_button_pressed_color">#3D000000</color>
              <color name="minebutton_color">#808080</color>
              <color name="background_app">#121212</color>
              <color name="divider">#2d2d2d</color>
              <color name="background_overlay">#2d2d2d</color>
              <color name="background_status_bar">#000000</color>
              <color name="background_bottom_bar">#1a1a1a</color>
              <color name="icon_outline_color">#e0e0e0</color>
              <color name="primary_text">#e0e0e0</color>
              <color name="secondary_text">#b3b3b3</color>
          </resources>
          EOF
          echo "✅ Added missing colors to colors.xml"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/colors.xml
          git diff --cached --quiet || git commit -m "Add missing color definitions (background_status_bar, divider)"
          git push origin HEAD:${GITHUB_REF_NAME}
