name: Fix Duplicate Layout Attributes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-duplicates:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicate android:layout_height attributes
        run: |
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i 's/\(android:layout_height="[^"]*"\)\s*android:layout_height="[^"]*"/\1/g' {} \;
          echo "✅ Removed duplicate layout_height attributes"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git diff --cached --quiet || git commit -m "Fix duplicate layout_height attributes in layouts"
          git push origin HEAD:${GITHUB_REF_NAME}
