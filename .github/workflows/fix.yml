name: Restore All Colors for Silver/White Theme

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-colors:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Write complete colors.xml with all required colors
        run: |
          cat > app_pojavlauncher/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <!-- Silver/White theme -->
              <color name="control_button_color">#9e9e9e</color>
              <color name="control_button_pressed_color">#3d000000</color>
              <color name="minebutton_color">#808080</color>
              <color name="background_app">#f5f5f5</color>
              <color name="divider">#e0e0e0</color>
              <color name="background_overlay">#eeeeee</color>
              <color name="background_status_bar">#ffffff</color>
              <color name="background_bottom_bar">#fafafa</color>
              <color name="icon_outline_color">#616161</color>
              <color name="primary_text">#212121</color>
              <color name="secondary_text">#757575</color>
          </resources>
          EOF
          echo "✅ All colors restored."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/colors.xml
          git diff --cached --quiet || git commit -m "Add missing background_status_bar and all silver/white colors"
          git push origin HEAD:${GITHUB_REF_NAME}
