name: Remove Divider & Add Gear Icon to Overlay

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-overlay:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Modify overlay layout
        run: |
          python3 << 'PYTHON'
          import re
          import xml.etree.ElementTree as ET
          from xml.dom import minidom

          LAYOUT_PATH = "app_pojavlauncher/src/main/res/layout/activity_java_gui_launcher.xml"

          # Parse the XML
          tree = ET.parse(LAYOUT_PATH)
          root = tree.getroot()

          # Find the root LinearLayout (assume first element)
          if root.tag != 'LinearLayout':
              # Find the first LinearLayout child
              for child in root:
                  if child.tag == 'LinearLayout':
                      root = child
                      break

          # 1. Remove any divider View (height 1dp or 2dp, background with divider color)
          to_remove = []
          for child in root:
              if child.tag == 'View':
                  height = child.get('android:layout_height')
                  bg = child.get('android:background')
                  if height and (height in ['1dp', '2dp', '1dip', '2dip']):
                      if bg and ('divider' in bg or '#e0e0e0' in bg or '#b0bec5' in bg):
                          to_remove.append(child)
          for child in to_remove:
              root.remove(child)
              print("Removed divider view")

          # 2. Create gear icon as ImageButton
          gear_btn = ET.Element('ImageButton')
          gear_btn.set('android:layout_width', 'wrap_content')
          gear_btn.set('android:layout_height', 'wrap_content')
          gear_btn.set('android:src', '@drawable/ic_gear')
          gear_btn.set('android:background', '?attr/selectableItemBackground')
          gear_btn.set('android:padding', '8dp')
          gear_btn.set('android:contentDescription', 'Settings')
          # Add onClick listener if you want (requires Java method)
          # gear_btn.set('android:onClick', 'openSettings')

          # 3. Also ensure all buttons are actually ImageButtons with icons
          # For each Button with text like "DEBUG" etc., change to ImageButton with icon
          # We'll do that too if not already done
          for child in root:
              if child.tag == 'Button' and child.text:
                  text = child.text.strip()
                  icon_map = {
                      'DEBUG': 'ic_debug',
                      'CHAT': 'ic_chat',
                      'KEYBOARD': 'ic_keyboard',
                      'TAB': 'ic_tab',
                      'MOUSE': 'ic_mouse',
                      '3RD': 'ic_3rd',
                      'PRI': 'ic_pri',
                      'SEC': 'ic_sec',
                      'GUI': 'ic_gui',
                      'INV': 'ic_inv',
                  }
                  if text in icon_map:
                      # Change to ImageButton
                      child.tag = 'ImageButton'
                      child.set('android:src', f'@drawable/{icon_map[text]}')
                      child.set('android:background', '?attr/selectableItemBackground')
                      child.set('android:padding', '8dp')
                      # Remove text
                      child.text = None
                      # Remove any other text attributes
                      if 'android:text' in child.attrib:
                          del child.attrib['android:text']
                      print(f"Converted {text} to ImageButton with icon {icon_map[text]}")

          # 4. Insert gear button as first child (top)
          root.insert(0, gear_btn)
          print("Inserted gear icon at top")

          # Save the modified XML with pretty formatting
          # Convert to string with minidom for pretty print
          rough_string = ET.tostring(tree.getroot(), encoding='utf-8')
          reparsed = minidom.parseString(rough_string)
          pretty_xml = reparsed.toprettyxml(indent="    ")
          # Write back
          with open(LAYOUT_PATH, 'w', encoding='utf-8') as f:
              f.write(pretty_xml)
          print("✅ Overlay layout updated successfully.")

          PYTHON

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/activity_java_gui_launcher.xml
          git diff --cached --quiet || git commit -m "Remove divider, add gear icon top, convert overlay buttons to icons"
          git push origin HEAD:${GITHUB_REF_NAME}
