name: Generate Complete Icon & UI Inventory Report

on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate comprehensive inventory
        run: |
          REPORT="icon-inventory-report.txt"
          
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ" > $REPORT
          echo "           FEAR LAUNCHER - ICON & UI INVENTORY REPORT" >> $REPORT
          echo "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ" >> $REPORT
          echo "Generated: $(date)" >> $REPORT
          echo "" >> $REPORT
          
          # =============== SECTION 1: ALL PNG FILES ===============
          echo "рҹ“Ғ SECTION 1: PNG FILES (Existing)" >> $REPORT
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" >> $REPORT
          find app_pojavlauncher/src/main/res -type f -name "*.png" | while read png; do
            # Get file size and dimensions if possible
            size=$(du -h "$png" | cut -f1)
            dims=$(file "$png" | grep -o '[0-9]* x [0-9]*' | head -1 || echo "unknown")
            echo "  рҹ“„ $png" >> $REPORT
            echo "     Size: $size | Dimensions: $dims" >> $REPORT
          done
          echo "" >> $REPORT
          
          # =============== SECTION 2: VECTOR DRAWABLES ===============
          echo "рҹ“Ғ SECTION 2: VECTOR DRAWABLES (XML)" >> $REPORT
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" >> $REPORT
          find app_pojavlauncher/src/main/res/drawable -type f -name "*.xml" | while read xml; do
            if grep -q "vector" "$xml"; then
              echo "  рҹ“„ $xml" >> $REPORT
              grep "android:width" "$xml" | head -1 >> $REPORT
            fi
          done
          echo "" >> $REPORT
          
          # =============== SECTION 3: ICON REFERENCES IN LAYOUTS ===============
          echo "рҹ“Ғ SECTION 3: ICON REFERENCES IN LAYOUTS" >> $REPORT
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" >> $REPORT
          echo "рҹ”Қ All @drawable references in layout files:" >> $REPORT
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec grep -H "android:src=\"@drawable/" {} \; | \
            sed 's/.*layout\/\(.*\)\.xml:.*android:src="\([^"]*\)"/  Layout: \1.xml -> \2/' >> $REPORT
          echo "" >> $REPORT
          
          # =============== SECTION 4: MISSING ICONS ===============
          echo "рҹ“Ғ SECTION 4: MISSING ICONS (References without files)" >> $REPORT
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" >> $REPORT
          echo "рҹ”Қ Checking for R.drawable references that have no file:" >> $REPORT
          # Extract all drawable references from layout files
          grep -rh "android:src=\"@drawable/" app_pojavlauncher/src/main/res/layout 2>/dev/null | \
            sed 's/.*@drawable\/\([^"]*\)".*/\1/' | sort -u | while read drawable; do
            if [ ! -f "app_pojavlauncher/src/main/res/drawable/${drawable}.xml" ] && \
               [ ! -f "app_pojavlauncher/src/main/res/drawable/${drawable}.png" ] && \
               [ ! -f "app_pojavlauncher/src/main/res/drawable-*/${drawable}.png" ]; then
              echo "  вқҢ MISSING: $drawable" >> $REPORT
              # Find where it's referenced
              echo "     Used in:" >> $REPORT
              grep -rn "android:src=\"@drawable/${drawable}" app_pojavlauncher/src/main/res/layout 2>/dev/null | \
                sed 's/.*layout\/\(.*\)\.xml.*/       - \1.xml/' >> $REPORT
            fi
          done
          echo "" >> $REPORT
          
          # =============== SECTION 5: SIDEBAR ANALYSIS ===============
          echo "рҹ“Ғ SECTION 5: SIDEBAR / NAVIGATION OPTIONS" >> $REPORT
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" >> $REPORT
          # Find navigation/sidebar layouts
          find app_pojavlauncher/src/main/res/layout -name "*nav*.xml" -o -name "*side*.xml" -o -name "*drawer*.xml" | while read sidebar; do
            echo "рҹ“„ Sidebar Layout: $sidebar" >> $REPORT
            grep -E "android:text=|android:icon=|android:src=" "$sidebar" 2>/dev/null | while read line; do
              text=$(echo "$line" | sed -n 's/.*android:text="\([^"]*\)".*/\1/p')
              icon=$(echo "$line" | sed -n 's/.*android:icon="\([^"]*\)".*/\1/p')
              src=$(echo "$line" | sed -n 's/.*android:src="\([^"]*\)".*/\1/p')
              if [ -n "$text" ]; then
                echo "   рҹ“Ң Option: $text" >> $REPORT
              fi
              if [ -n "$icon" ]; then
                echo "      Icon: $icon" >> $REPORT
              fi
              if [ -n "$src" ]; then
                echo "      Src: $src" >> $REPORT
              fi
            done
          done
          echo "" >> $REPORT
          
          # =============== SECTION 6: BUTTON DETAILS ===============
          echo "рҹ“Ғ SECTION 6: BUTTON DETAILS" >> $REPORT
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" >> $REPORT
          echo "рҹ”Қ All buttons with their text and icons:" >> $REPORT
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec grep -l "<Button" {} \; | while read layout; do
            echo "  рҹ“„ $layout" >> $REPORT
            grep "<Button" "$layout" 2>/dev/null | head -10 | while read btn; do
              text=$(echo "$btn" | sed -n 's/.*android:text="\([^"]*\)".*/\1/p')
              icon=$(echo "$btn" | sed -n 's/.*android:drawableStart="\([^"]*\)".*/\1/p')
              bg=$(echo "$btn" | sed -n 's/.*android:background="\([^"]*\)".*/\1/p')
              echo "    рҹ”ҳ $text | icon: $icon | bg: $bg" >> $REPORT
            done
          done
          echo "" >> $REPORT
          
          # =============== SECTION 7: MENU ITEMS ===============
          echo "рҹ“Ғ SECTION 7: MENU OPTIONS" >> $REPORT
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" >> $REPORT
          find app_pojavlauncher/src/main/res/menu -name "*.xml" 2>/dev/null | while read menu; do
            echo "рҹ“„ Menu: $menu" >> $REPORT
            grep "android:title=" "$menu" 2>/dev/null | while read item; do
              title=$(echo "$item" | sed -n 's/.*android:title="\([^"]*\)".*/\1/p')
              icon=$(echo "$item" | sed -n 's/.*android:icon="\([^"]*\)".*/\1/p')
              id=$(echo "$item" | sed -n 's/.*android:id="\([^"]*\)".*/\1/p')
              echo "   рҹ“Ң $title | icon: $icon | id: $id" >> $REPORT
            done
          done
          echo "" >> $REPORT
          
          # =============== SECTION 8: OVERLAY/IN-GAME BUTTONS ===============
          echo "рҹ“Ғ SECTION 8: OVERLAY / IN-GAME CONTROLS" >> $REPORT
          echo "в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ" >> $REPORT
          find app_pojavlauncher/src/main/res/layout -name "*control*.xml" -o -name "*gamepad*.xml" -o -name "*overlay*.xml" | while read ov; do
            echo "рҹ“„ $ov" >> $REPORT
            grep -E "android:text=|android:src=" "$ov" 2>/dev/null | while read line; do
              text=$(echo "$line" | sed -n 's/.*android:text="\([^"]*\)".*/\1/p')
              src=$(echo "$line" | sed -n 's/.*android:src="\([^"]*\)".*/\1/p')
              if [ -n "$text" ]; then
                echo "   рҹҺ® $text" >> $REPORT
                if [ -n "$src" ]; then
                  echo "      src: $src" >> $REPORT
                fi
              fi
            done
          done
          echo "" >> $REPORT
          
          # =============== SUMMARY ===============
          echo "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—" >> $REPORT
          echo "в•‘                         SUMMARY                             в•‘" >> $REPORT
          echo "в• в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•Ј" >> $REPORT
          total_png=$(find app_pojavlauncher/src/main/res -type f -name "*.png" 2>/dev/null | wc -l)
          total_vector=$(grep -l "vector" app_pojavlauncher/src/main/res/drawable/*.xml 2>/dev/null | wc -l)
          total_missing=$(grep "вқҢ MISSING" $REPORT | wc -l)
          total_layouts=$(find app_pojavlauncher/src/main/res/layout -name "*.xml" 2>/dev/null | wc -l)
          total_buttons=$(grep -r "<Button" app_pojavlauncher/src/main/res/layout 2>/dev/null | wc -l)
          
          echo "в•‘  PNG Files: $total_png" >> $REPORT
          echo "в•‘  Vector Drawables: $total_vector" >> $REPORT
          echo "в•‘  Missing Icons: $total_missing" >> $REPORT
          echo "в•‘  Layout Files: $total_layouts" >> $REPORT
          echo "в•‘  Total Buttons: $total_buttons" >> $REPORT
          echo "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ" >> $REPORT
          
          echo "вң… Report generated: $REPORT"
          cat $REPORT

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: icon-inventory-report
          path: icon-inventory-report.txt
