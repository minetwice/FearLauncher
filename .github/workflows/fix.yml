name: Add Missing minebutton_color

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-color:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Append minebutton_color to colors.xml
        run: |
          COLORS="app_pojavlauncher/src/main/res/values/colors.xml"
          # Check if already present
          if grep -q 'minebutton_color' "$COLORS"; then
            echo "minebutton_color already exists"
            exit 0
          fi
          # Insert before closing tag
          sed -i '/<\/resources>/i\
    <color name="minebutton_color">#9e9e9e</color>' "$COLORS"
          echo "✅ Added minebutton_color"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/colors.xml
          git diff --cached --quiet || git commit -m "Add minebutton_color for button backgrounds"
          git push origin HEAD:${GITHUB_REF_NAME}
