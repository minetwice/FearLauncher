name: Fix All Translations

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add formatted="false" to all needed strings
        run: |
          STRINGS=(
            "mcl_launch_downloading_progress"
            "modpack_download_downloading_metadata"
            "modpack_download_downloading_mods"
            "newdl_downloading_game_files_size"
            "memory_warning_msg"
            "address_memory_warning_msg"
            "modpack_download_applying_overrides"
            "modpack_download_downloading_mods_fc"
            "newdl_downloading_game_files"
            "newdl_extracting_native_libraries"
            "newerdl_downloading_files_count"
            "newerdl_downloading_files_size"
            "newerdl_inserting_metadata_count"
            "downloading_java_runtime_platform"
            "downloading_java_runtime_uni"
          )
          find app_pojavlauncher/src/main/res/values* -name "strings.xml" -type f | while read f; do
            for str in "${STRINGS[@]}"; do
              if grep -q "name=\"$str\"" "$f" && ! grep -q "name=\"$str\".*formatted=" "$f"; then
                echo "✅ Adding formatted=\"false\" to $str in $f"
                sed -i "s/name=\"$str\"/name=\"$str\" formatted=\"false\"/g" "$f"
              fi
            done
            # Remove duplicates (if any)
            sed -i 's/formatted="false" formatted="false"/formatted="false"/g' "$f"
          done
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          git diff --staged --quiet || git commit -m "fix: add formatted=false to all translations"
          git push
