name: Fix Translation Strings (No Build)

on:
  workflow_dispatch:  # Manually run from Actions tab

jobs:
  fix-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ====================================================
      # 🔥 AGGRESSIVE FIX – Remove duplicates & add clean formatted="false"
      # ====================================================
      - name: Fix strings.xml files
        run: |
          echo "🔍 Scanning and fixing translation files..."

          STRINGS_TO_FIX=(
            "mcl_launch_downloading_progress"
            "modpack_download_downloading_metadata"
            "modpack_download_downloading_mods"
            "newdl_downloading_game_files_size"
            "memory_warning_msg"
          )

          # Process every strings.xml in values-* folders
          find app_pojavlauncher/src/main/res/values* -name "strings.xml" -type f | while read -r file; do
            echo "📄 Processing: $file"
            
            for str in "${STRINGS_TO_FIX[@]}"; do
              if grep -q "name=\"$str\"" "$file"; then
                # 🧠 LOGIC: Remove any existing 'formatted' attribute, then add clean 'formatted="false"'
                # This ensures NO duplicates ever.
                perl -pi -e "s/(name=\"$str\")(\s+formatted=\"[^\"]*\")?/\1 formatted=\"false\"/g" "$file"
                echo "  ✅ Fixed '$str' in $(basename $file)"
              fi
            done
          done

          echo "✅ All translation fixes applied successfully!"
        shell: bash

      # ====================================================
      # 💾 COMMIT & PUSH CHANGES (Optional)
      # ====================================================
      - name: Commit and push fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit."
          else
            git commit -m "ci: clean duplicate formatted attributes in translations"
            git push
            echo "✅ Changes pushed to repository!"
          fi
        shell: bash
