name: Fix Translation Strings

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fix translations
        run: |
          find app_pojavlauncher/src/main/res/values* -name "strings.xml" -type f | while read -r file; do
            perl -pi -e 's/\s+formatted="[^"]*"//g; s/(name="[^"]+")/\1 formatted="false"/g' "$file"
          done
          
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          git diff --staged --quiet || git commit -m "fix: remove duplicate formatted attributes"
          git push
