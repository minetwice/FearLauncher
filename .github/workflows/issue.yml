name: Fix Translation Strings

on:
  workflow_dispatch:  # सिर्फ Manual Run के लिए

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Auto-fix formatted="false"
        run: |
          STRINGS_TO_FIX=(
            "mcl_launch_downloading_progress"
            "modpack_download_downloading_metadata"
            "modpack_download_downloading_mods"
            "newdl_downloading_game_files_size"
            "memory_warning_msg"
          )
          find app_pojavlauncher/src/main/res/values* -name "strings.xml" -type f | while read -r file; do
            for str in "${STRINGS_TO_FIX[@]}"; do
              if grep -q "name=\"$str\"" "$file" && ! grep -q "name=\"$str\" formatted=\"false\"" "$file"; then
                echo "✅ Fixing $str in $file"
                sed -i "s/name=\"$str\"/name=\"$str\" formatted=\"false\"/g" "$file"
              fi
            done
          done
      
      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "ci: auto-add formatted=false to translations"
          git push
