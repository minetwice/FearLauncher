name: Fix Duplicate Formatted Attributes

on:
  workflow_dispatch:  # Manually trigger karo jab chahiye

jobs:
  fix-strings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fix duplicate formatted attributes in all strings.xml
        run: |
          python3 - <<'EOF'
          import os, re, glob

          res_dir = "app_pojavlauncher/src/main/res"
          xml_files = glob.glob(os.path.join(res_dir, "**", "strings.xml"), recursive=True)

          fixed_count = 0
          for path in sorted(xml_files):
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
              original = content
              for _ in range(3):
                  content = re.sub(
                      r'(<string\b[^>]*?)\bformatted="(false|true)"([^>]*?)\bformatted="(false|true)"',
                      r'\1formatted="\2"\3',
                      content
                  )
              if content != original:
                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f"FIXED: {path}")
                  fixed_count += 1
              else:
                  print(f"OK:    {path}")

          print(f"\nTotal fixed: {fixed_count}/{len(xml_files)} files")
          EOF

      - name: Commit and Push fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/**/strings.xml
          git diff --cached --quiet || git commit -m "fix: remove duplicate formatted attribute from strings.xml"
          git push
