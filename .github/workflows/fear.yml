name: Extract FEAR Core

on:
  workflow_dispatch: # Sirf manual button se chalega

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Extraction Script
        run: python3 extract_fear_core.py

      - name: Create Branch & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "fear_core_extracted" ]; then
            # Extracted files ko root par move karo
            cp -r fear_core_extracted/* .
            rm -rf fear_core_extracted
            
            # Naya branch bana aur push kar
            git checkout -b fear-core || git checkout fear-core
            git add .
            git commit -m "feat: auto-extracted core for FEAR LAUNCHER" || echo "No changes"
            git push origin fear-core --force
          else
            echo "❌ No core files extracted!"
            exit 1
          fi

      - name: Upload Extraction Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extraction-report
          path: fear_core_extracted/
