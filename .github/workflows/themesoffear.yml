name: Apply Black & Silver Theme

on:
  workflow_dispatch:

jobs:
  recolor:
    name: Convert all colors to Black/Silver Gradient
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run color replacement script
        run: |
          python3 - << 'EOF'
          import os, re
          BLACK_SILVER_PALETTE = ["#000000","#1a1a1a","#2d2d2d","#4d4d4d","#808080","#b3b3b3","#e0e0e0"]
          def brightness(c):
              c=c.lstrip('#')
              if len(c)==8: c=c[2:]
              if len(c)==6:
                  r,g,b=int(c[0:2],16),int(c[2:4],16),int(c[4:6],16)
                  return r*0.299+g*0.587+b*0.114
              return 128
          def map_to_palette(c):
              idx = min(6, max(0, int(brightness(c)/255*6)))
              return BLACK_SILVER_PALETTE[idx]
          def process(f):
              if not os.path.exists(f): return
              with open(f,'r') as fp: content=fp.read()
              hex_pattern=re.compile(r'(#[0-9A-Fa-f]{3,8})(?=[\s\>\"\'\)])')
              orig=hex_pattern.findall(content)
              if not orig: return
              newc=content
              changes=0
              for old in set(orig):
                  new=map_to_palette(old)
                  if new!=old:
                      newc=newc.replace(old,new)
                      changes+=1
              if changes>0:
                  with open(f,'w') as fp: fp.write(newc)
                  print(f"✅ Updated {f}")
          for f in ["app_pojavlauncher/src/main/res/values/colors.xml","app_pojavlauncher/src/main/res/values-night/colors.xml","app_pojavlauncher/src/main/res/values/themes.xml","app_pojavlauncher/src/main/res/values/styles.xml"]:
              process(f)
          layout_dir="app_pojavlauncher/src/main/res/layout"
          if os.path.exists(layout_dir):
              for root,_,files in os.walk(layout_dir):
                  for file in files:
                      if file.endswith(".xml"):
                          process(os.path.join(root,file))
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/*.xml
          git add app_pojavlauncher/src/main/res/layout/*.xml 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🎨 Apply Black & Silver theme (auto-generated)"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Upload modified files
        uses: actions/upload-artifact@v4
        with:
          name: black-silver-themed-src
          path: app_pojavlauncher/src/main/res/
