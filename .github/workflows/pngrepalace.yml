name: Remove Backup XML Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Delete all .bak files in layout directory
        run: |
          find app_pojavlauncher/src/main/res/layout -type f -name "*.bak" -delete
          echo "✅ Removed .bak files"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git diff --cached --quiet || git commit -m "Remove backup .bak files from layout"
          git push origin HEAD:${GITHUB_REF_NAME}
