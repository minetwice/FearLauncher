name: Direct Fix fragment_launcher.xml

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove corrupted fragment_launcher.xml
        run: |
          rm -f app_pojavlauncher/src/main/res/layout/fragment_launcher.xml
          echo "✅ Removed old fragment_launcher.xml"

      - name: Download clean fragment_launcher.xml from MojoLauncher
        run: |
          curl -s -o app_pojavlauncher/src/main/res/layout/fragment_launcher.xml \
            https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout/fragment_launcher.xml
          echo "✅ Downloaded clean fragment_launcher.xml"

      - name: Ensure all views have layout_height (Python fallback)
        run: |
          python3 << 'PYTHON'
          import os, re, glob, xml.etree.ElementTree as ET
          from xml.dom import minidom

          layout_dir = "app_pojavlauncher/src/main/res/layout"
          for xml_file in glob.glob(f"{layout_dir}/**/*.xml", recursive=True):
              try:
                  tree = ET.parse(xml_file)
                  root = tree.getroot()
              except ET.ParseError:
                  continue
              changed = False
              for elem in root.iter():
                  if 'android:layout_width' in elem.attrib and 'android:layout_height' not in elem.attrib:
                      elem.set('android:layout_height', 'wrap_content')
                      changed = True
              if changed:
                  rough_string = ET.tostring(root, encoding='utf-8')
                  reparsed = minidom.parseString(rough_string)
                  pretty_xml = reparsed.toprettyxml(indent="    ")
                  pretty_xml = '\n'.join([line for line in pretty_xml.splitlines() if line.strip()])
                  with open(xml_file, 'w', encoding='utf-8') as f:
                      f.write(pretty_xml)
                  print(f"Fixed: {xml_file}")
          print("✅ All layouts have layout_height where needed.")

      - name: Fix string formatting warnings
        run: |
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i '/<string name="[^"]*">.*%.*%.*</s/<string /<string formatted="false" /' {} \;
          echo "✅ Strings fixed."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"   # ✅ Fixed: space instead of dot
          git add app_pojavlauncher/src/main/res/layout/fragment_launcher.xml
          git add app_pojavlauncher/src/main/res/layout/
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          git diff --cached --quiet || git commit -m "Replace fragment_launcher with clean version and ensure all layout_height present"
          git push origin HEAD:${GITHUB_REF_NAME}
