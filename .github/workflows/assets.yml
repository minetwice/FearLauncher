name: Fix fragment_launcher.xml Directly

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download clean fragment_launcher.xml from MojoLauncher
        run: |
          curl -s -o app_pojavlauncher/src/main/res/layout/fragment_launcher.xml \
            https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout/fragment_launcher.xml
          echo "✅ Downloaded clean fragment_launcher.xml"

      - name: Also download other problematic layouts if they exist (optional)
        run: |
          # Also download fragment_instance_editor.xml just in case
          curl -s -o app_pojavlauncher/src/main/res/layout/fragment_instance_editor.xml \
            https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout/fragment_instance_editor.xml
          echo "✅ Also downloaded fragment_instance_editor.xml"

      - name: Add missing layout_height to all views (just in case)
        run: |
          # For every layout file, ensure layout_height is present
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i '/android:layout_width=/ { /android:layout_height=/! s/\(android:layout_width="[^"]*"\)/\1 android:layout_height="wrap_content"/ }' {} \;
          echo "✅ Added missing layout_height to all layouts."

      - name: Fix string formatting warnings
        run: |
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i '/<string name="[^"]*">.*%.*%.*</s/<string /<string formatted="false" /' {} \;
          echo "✅ Strings fixed."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          git diff --cached --quiet || git commit -m "Fix fragment_launcher and add missing layout_height to all layouts"
          git push origin HEAD:${GITHUB_REF_NAME}
