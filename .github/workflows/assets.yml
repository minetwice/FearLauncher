name: Remove Duplicate Attributes & Fix Strings

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicate attributes from all layout XMLs
        run: |
          python3 << 'PYTHON'
          import os, re, glob
          import xml.etree.ElementTree as ET
          from collections import OrderedDict

          layout_dir = "app_pojavlauncher/src/main/res/layout"
          for xml_file in glob.glob(f"{layout_dir}/**/*.xml", recursive=True):
              with open(xml_file, 'r', encoding='utf-8') as f:
                  content = f.read()

              # Use regex to find tags with duplicate attributes
              # We'll handle tags individually and remove duplicates.
              def clean_tag(tag_text):
                  # Find all attribute pairs (name="value")
                  attr_pattern = r'([a-zA-Z0-9_:]+)="([^"]*)"'
                  attrs = re.findall(attr_pattern, tag_text)
                  # Keep only the first occurrence of each attribute name
                  seen = OrderedDict()
                  for name, value in attrs:
                      if name not in seen:
                          seen[name] = value
                  # Rebuild the tag
                  # Split at the first '>' to separate opening tag from children if any
                  if '>' in tag_text:
                      before, after = tag_text.split('>', 1)
                  else:
                      before = tag_text
                      after = ''
                  # Rebuild the opening tag part
                  new_before = before.split()[0]  # tag name
                  for name, value in seen.items():
                      new_before += f' {name}="{value}"'
                  # Handle self-closing
                  if before.endswith('/>'):
                      new_before += ' />'
                  else:
                      new_before += '>'
                  return new_before + after

              # Find all tags (simple regex, works for tags without nested < inside)
              # We'll match tags that are standalone (not within text)
              # Use a pattern that captures the whole tag
              pattern = r'<[^>]*>'
              new_content = re.sub(pattern, lambda m: clean_tag(m.group(0)), content)

              if new_content != content:
                  with open(xml_file, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print(f"Cleaned: {xml_file}")

          print("✅ Duplicate attributes removed.")

      - name: Fix string formatting warnings
        run: |
          # Add formatted="false" to strings with multiple placeholders
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i '/<string name="[^"]*">.*%.*%.*</s/<string /<string formatted="false" /' {} \;
          echo "✅ Strings fixed."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          git diff --cached --quiet || git commit -m "Remove duplicate layout attributes and fix string formatting"
          git push origin HEAD:${GITHUB_REF_NAME}
