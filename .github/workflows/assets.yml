name: Clean Duplicate Attributes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicate layout_height from all layout files
        run: |
          python3 << 'PYTHON'
          import os, re, glob

          layout_dir = "app_pojavlauncher/src/main/res/layout"
          for xml_file in glob.glob(f"{layout_dir}/**/*.xml", recursive=True):
              with open(xml_file, 'r', encoding='utf-8') as f:
                  content = f.read()
              # Remove duplicate android:layout_height
              pattern = r'(android:layout_height="[^"]*")\s+android:layout_height="[^"]*"'
              new_content = re.sub(pattern, r'\1', content)
              # Also remove duplicate android:layout_width if any
              pattern2 = r'(android:layout_width="[^"]*")\s+android:layout_width="[^"]*"'
              new_content = re.sub(pattern2, r'\1', new_content)
              if new_content != content:
                  with open(xml_file, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print(f"Cleaned: {xml_file}")
          print("✅ Duplicates removed.")

      - name: Fix string formatting warning
        run: |
          sed -i 's/<string name="bind_process_waiting_joystick">/<string formatted="false" name="bind_process_waiting_joystick">/' app_pojavlauncher/src/main/res/values/strings.xml
          echo "✅ String warning fixed."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git add app_pojavlauncher/src/main/res/values/strings.xml
          git diff --cached --quiet || git commit -m "Remove duplicate layout_height from all layouts, fix string warning"
          git push origin HEAD:${GITHUB_REF_NAME}
