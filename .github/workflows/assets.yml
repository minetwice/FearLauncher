name: Direct Fix Problematic Layouts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download fresh copies from MojoLauncher
        run: |
          BASE_URL="https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout"
          FILES=(
            "fragment_mod_version_list.xml"
            "fragment_file_selector.xml"
            "spinner_mc_version.xml"
            "fragment_profile_type.xml"
          )
          for file in "${FILES[@]}"; do
            curl -s -o "app_pojavlauncher/src/main/res/layout/$file" "$BASE_URL/$file"
            echo "Downloaded: $file"
          done

      - name: Force remove duplicate layout_height attributes
        run: |
          for file in fragment_mod_version_list.xml fragment_file_selector.xml spinner_mc_version.xml fragment_profile_type.xml; do
            sed -i 's/\(android:layout_height="[^"]*"\)\s*android:layout_height="[^"]*"/\1/g' "app_pojavlauncher/src/main/res/layout/$file"
            echo "Cleaned: $file"
          done

      - name: Add missing layout_height to all views in those files
        run: |
          for file in fragment_mod_version_list.xml fragment_file_selector.xml spinner_mc_version.xml fragment_profile_type.xml; do
            sed -i '/android:layout_width=/ { /android:layout_height=/! s/\(android:layout_width="[^"]*"\)/\1 android:layout_height="wrap_content"/ }' "app_pojavlauncher/src/main/res/layout/$file"
            echo "Added missing height: $file"
          done

      - name: Fix specific string formatting warning
        run: |
          sed -i 's/<string name="bind_process_waiting_joystick">/<string formatted="false" name="bind_process_waiting_joystick">/' app_pojavlauncher/src/main/res/values/strings.xml
          echo "Fixed string warning."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/fragment_mod_version_list.xml
          git add app_pojavlauncher/src/main/res/layout/fragment_file_selector.xml
          git add app_pojavlauncher/src/main/res/layout/spinner_mc_version.xml
          git add app_pojavlauncher/src/main/res/layout/fragment_profile_type.xml
          git add app_pojavlauncher/src/main/res/values/strings.xml
          git diff --cached --quiet || git commit -m "Direct fix: download clean layouts, remove duplicate layout_height, fix string"
          git push origin HEAD:${GITHUB_REF_NAME}
