name: Fix Duplicate Attributes & Strings

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicate android:layout_height attributes (Python)
        run: |
          python3 << 'PYTHON'
          import os, re, glob

          layout_dir = "app_pojavlauncher/src/main/res/layout"
          for xml_file in glob.glob(f"{layout_dir}/**/*.xml", recursive=True):
              with open(xml_file, 'r', encoding='utf-8') as f:
                  content = f.read()
              # Use regex to find duplicate layout_height inside a tag
              pattern = r'(android:layout_height="[^"]*")\s+android:layout_height="[^"]*"'
              new_content = re.sub(pattern, r'\1', content)
              if new_content != content:
                  with open(xml_file, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print(f"Fixed duplicate in: {xml_file}")
          print("✅ Removed duplicate layout_height attributes")

      - name: Fix string formatting warnings
        run: |
          # Add formatted="false" to all strings that contain multiple % placeholders
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i '/<string name="[^"]*">.*%.*%.*</s/<string /<string formatted="false" /' {} \;
          echo "✅ Added formatted=false to strings with multiple substitutions"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          git diff --cached --quiet || git commit -m "Fix duplicate layout_height and string formatting"
          git push origin HEAD:${GITHUB_REF_NAME}
