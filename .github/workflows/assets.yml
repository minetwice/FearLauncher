name: Fix Duplicate ic_launcher_background

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicate ic_launcher_background from colors.xml
        run: |
          # Delete the line containing ic_launcher_background from colors.xml
          sed -i '/ic_launcher_background/d' app_pojavlauncher/src/main/res/values/colors.xml
          echo "✅ Removed duplicate ic_launcher_background from colors.xml"

      - name: Ensure ic_launcher_background.xml exists with correct value
        run: |
          mkdir -p app_pojavlauncher/src/main/res/values
          cat > app_pojavlauncher/src/main/res/values/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#E8EEF0</color>
          </resources>
          EOF
          echo "✅ Ensured ic_launcher_background.xml exists"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/colors.xml
          git add app_pojavlauncher/src/main/res/values/ic_launcher_background.xml
          git diff --cached --quiet || git commit -m "Remove duplicate ic_launcher_background color definition"
          git push origin HEAD:${GITHUB_REF_NAME}
