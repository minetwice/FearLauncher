name: Fix Missing layout_height

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Add missing layout_height to all layout files
        run: |
          # For each layout XML, add layout_height="wrap_content" to any tag that has layout_width but not layout_height
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -type f -exec sed -i '/android:layout_width=/ { /android:layout_height=/! s/\(android:layout_width="[^"]*"\)/\1 android:layout_height="wrap_content"/ }' {} \;
          echo "✅ Added missing layout_height attributes."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git diff --cached --quiet || git commit -m "Fix missing layout_height in layouts"
          git push origin HEAD:${GITHUB_REF_NAME}
