name: Replace & Clean Problematic Layouts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download clean versions of all problematic layouts
        run: |
          BASE_URL="https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout"
          FILES=(
            "fragment_mod_version_list.xml"
            "fragment_file_selector.xml"
            "spinner_mc_version.xml"
            "fragment_profile_type.xml"
            "fragment_launcher.xml"
            "activity_pojav_launcher.xml"
            "fragment_instance_editor.xml"
          )
          for file in "${FILES[@]}"; do
            curl -s -o "app_pojavlauncher/src/main/res/layout/$file" "$BASE_URL/$file"
            echo "Restored: $file"
          done

      - name: Remove duplicate attributes from all layout files
        run: |
          python3 << 'PYTHON'
          import os, re, glob

          layout_dir = "app_pojavlauncher/src/main/res/layout"
          for xml_file in glob.glob(f"{layout_dir}/**/*.xml", recursive=True):
              with open(xml_file, 'r', encoding='utf-8') as f:
                  content = f.read()

              # Pattern to find duplicate android:layout_height within the same tag
              # This handles cases with or without spaces
              pattern = r'(android:layout_height="[^"]*")\s+android:layout_height="[^"]*"'
              new_content = re.sub(pattern, r'\1', content)

              # Also handle duplicate android:layout_width if any
              pattern2 = r'(android:layout_width="[^"]*")\s+android:layout_width="[^"]*"'
              new_content = re.sub(pattern2, r'\1', new_content)

              if new_content != content:
                  with open(xml_file, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print(f"Cleaned: {xml_file}")
          print("✅ Duplicate attributes removed.")

      - name: Ensure all views have layout_height (add if missing)
        run: |
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i '/android:layout_width=/ { /android:layout_height=/! s/\(android:layout_width="[^"]*"\)/\1 android:layout_height="wrap_content"/ }' {} \;
          echo "✅ Missing layout_height added."

      - name: Fix string formatting warnings
        run: |
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i '/<string name="[^"]*">.*%.*%.*</s/<string /<string formatted="false" /' {} \;
          echo "✅ Strings fixed."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          git diff --cached --quiet || git commit -m "Replace problematic layouts, remove duplicate attributes, add missing layout_height, fix strings"
          git push origin HEAD:${GITHUB_REF_NAME}
