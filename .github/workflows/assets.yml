name: Restore ALL Layouts & Fix Strings

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download ALL layout files from MojoLauncher
        run: |
          # Get list of all layout files from original repo
          curl -s "https://api.github.com/repos/MojoLauncher/MojoLauncher/contents/app_pojavlauncher/src/main/res/layout?ref=v3_openjdk" | \
            grep -o '"name": "[^"]*\.xml"' | sed 's/"name": "//g' | sed 's/"//g' > layout_files.txt
          # Also get layouts from layout-land
          curl -s "https://api.github.com/repos/MojoLauncher/MojoLauncher/contents/app_pojavlauncher/src/main/res/layout-land?ref=v3_openjdk" | \
            grep -o '"name": "[^"]*\.xml"' | sed 's/"name": "//g' | sed 's/"//g' >> layout_files.txt
          BASE_URL="https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout"
          for file in $(cat layout_files.txt); do
            curl -s -o "app_pojavlauncher/src/main/res/layout/$file" "$BASE_URL/$file"
            echo "Restored: $file"
          done
          # Also restore layout-land files
          BASE_LAND="https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout-land"
          mkdir -p app_pojavlauncher/src/main/res/layout-land
          for file in $(cat layout_files.txt); do
            curl -s -o "app_pojavlauncher/src/main/res/layout-land/$file" "$BASE_LAND/$file" 2>/dev/null || true
          done

      - name: Fix string formatting warnings using Python
        run: |
          python3 << 'PYTHON'
          import os, re, glob
          for strings_file in glob.glob("app_pojavlauncher/src/main/res/**/strings.xml", recursive=True):
              with open(strings_file, 'r', encoding='utf-8') as f:
                  content = f.read()
              def add_formatting(match):
                  tag = match.group(0)
                  if 'formatted=' not in tag:
                      text = re.search(r'>(.*?)</string>', tag, re.DOTALL)
                      if text and text.group(1).count('%') > 1:
                          tag = tag.replace('<string ', '<string formatted="false" ', 1)
                  return tag
              pattern = r'<string [^>]*>.*?</string>'
              new_content = re.sub(pattern, add_formatting, content, flags=re.DOTALL)
              if new_content != content:
                  with open(strings_file, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print(f"Fixed: {strings_file}")
          print("✅ Strings fixed.")
          PYTHON

      - name: Apply theme changes (only to main activity and fragment)
        run: |
          LAYOUT="app_pojavlauncher/src/main/res/layout/activity_pojav_launcher.xml"
          sed -i '1s/\(<LinearLayout[^>]*\)/\1 android:background="@drawable\/bg_animated_gradient"/' "$LAYOUT"
          sed -i 's|<Button |<Button style="@style/RoundedButton" |g' "$LAYOUT"
          sed -i 's|android:textColor="#[^"]*"|android:textColor="@color/primary_text"|g' "$LAYOUT"
          sed -i 's|<Button |<Button android:stateListAnimator="@anim/button_click" |g' "$LAYOUT"

          # Also apply to fragment_launcher
          FRAG="app_pojavlauncher/src/main/res/layout/fragment_launcher.xml"
          sed -i 's|<Button |<Button style="@style/RoundedButton" |g' "$FRAG"
          sed -i 's|android:textColor="#[^"]*"|android:textColor="@color/primary_text"|g' "$FRAG"
          # Also apply to activity_java_gui_launcher.xml (in-game overlay)
          JAVA="app_pojavlauncher/src/main/res/layout/activity_java_gui_launcher.xml"
          sed -i 's|<Button |<Button style="@style/RoundedButton" |g' "$JAVA"
          echo "✅ Theme reapplied."

      - name: Ensure drawables and styles exist
        run: |
          mkdir -p app_pojavlauncher/src/main/res/drawable
          mkdir -p app_pojavlauncher/src/main/res/anim
          cat > app_pojavlauncher/src/main/res/drawable/bg_animated_gradient.xml << 'EOF'
          <transition xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@drawable/grad_silver_blue_1" />
              <item android:drawable="@drawable/grad_silver_blue_2" />
          </transition>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/grad_silver_blue_1.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#E8EEF0" android:endColor="#CFD8DC" android:angle="45" android:type="linear"/>
          </shape>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/grad_silver_blue_2.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#CFD8DC" android:endColor="#B0BEC5" android:angle="135" android:type="linear"/>
          </shape>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/btn_rounded.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/control_button_color"/>
              <corners android:radius="16dp"/>
          </shape>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/btn_ripple.xml << 'EOF'
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/accent_blue">
              <item android:drawable="@drawable/btn_rounded"/>
          </ripple>
          EOF
          cat > app_pojavlauncher/src/main/res/anim/button_click.xml << 'EOF'
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <scale android:duration="150" android:fromXScale="1.0" android:fromYScale="1.0"
                  android:toXScale="0.95" android:toYScale="0.95" android:pivotX="50%" android:pivotY="50%" />
              <scale android:duration="150" android:fromXScale="0.95" android:fromYScale="0.95"
                  android:toXScale="1.0" android:toYScale="1.0" android:pivotX="50%" android:pivotY="50%"
                  android:startOffset="150" />
          </set>
          EOF
          echo "✅ Drawables and animations created."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/
          git diff --cached --quiet || git commit -m "Restore ALL layout files, fix strings, reapply theme"
          git push origin HEAD:${GITHUB_REF_NAME}
