name: Fix Layout Duplicates

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download clean problematic layout files from MojoLauncher
        run: |
          BASE_URL="https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout"
          FILES=(
            "dialog_side_dialog.xml"
            "activity_basemain.xml"
          )
          for file in "${FILES[@]}"; do
            curl -s -o "app_pojavlauncher/src/main/res/layout/$file" "$BASE_URL/$file"
            echo "Restored: $file"
          done

      - name: Remove duplicate layout_height from all layout files (extra safety)
        run: |
          python3 << 'PYTHON'
          import os, re, glob

          layout_dir = "app_pojavlauncher/src/main/res/layout"
          for xml_file in glob.glob(f"{layout_dir}/**/*.xml", recursive=True):
              with open(xml_file, 'r', encoding='utf-8') as f:
                  content = f.read()
              # Remove duplicate android:layout_height
              pattern = r'(android:layout_height="[^"]*")\s+android:layout_height="[^"]*"'
              new_content = re.sub(pattern, r'\1', content)
              if new_content != content:
                  with open(xml_file, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print(f"Cleaned: {xml_file}")
          print("✅ Duplicates removed.")

      - name: Fix string formatting warning
        run: |
          sed -i 's/<string name="bind_process_waiting_joystick">/<string formatted="false" name="bind_process_waiting_joystick">/' app_pojavlauncher/src/main/res/values/strings.xml
          echo "✅ String warning fixed."

      - name: Apply theme changes (minimal)
        run: |
          for file in dialog_side_dialog.xml activity_basemain.xml; do
            if [ -f "app_pojavlauncher/src/main/res/layout/$file" ]; then
              sed -i 's|<Button |<Button style="@style/RoundedButton" |g' "app_pojavlauncher/src/main/res/layout/$file"
              sed -i 's|android:textColor="#[^"]*"|android:textColor="@color/primary_text"|g' "app_pojavlauncher/src/main/res/layout/$file"
              sed -i 's|<Button |<Button android:stateListAnimator="@anim/button_click" |g' "app_pojavlauncher/src/main/res/layout/$file"
            fi
          done
          echo "✅ Theme applied."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout/dialog_side_dialog.xml
          git add app_pojavlauncher/src/main/res/layout/activity_basemain.xml
          git add app_pojavlauncher/src/main/res/values/strings.xml
          git diff --cached --quiet || git commit -m "Fix duplicate layout_height in dialog_side_dialog and activity_basemain"
          git push origin HEAD:${GITHUB_REF_NAME}
