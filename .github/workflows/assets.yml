name: Restore Layouts & Reapply Theme

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download clean layout files from MojoLauncher
        run: |
          # List of problematic files
          FILES=(
            "activity_basemain.xml"
            "item_centered_textview_large.xml"
            "fragment_local_login.xml"
            "fragment_select_auth_method.xml"
            "fragment_mod_version_list.xml"
            "fragment_file_selector.xml"
            "spinner_mc_version.xml"
            "fragment_profile_type.xml"
            "activity_custom_controls.xml"
            "item_minecraft_account.xml"
            "activity_java_gui_launcher.xml"
            "activity_pojav_launcher.xml"
          )
          BASE_URL="https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout"
          for file in "${FILES[@]}"; do
            curl -s -o "app_pojavlauncher/src/main/res/layout/$file" "$BASE_URL/$file"
            echo "Restored: $file"
          done

      - name: Apply theme changes safely (background, colors, button style)
        run: |
          # 1. Set animated gradient background in main launcher activity
          LAYOUT="app_pojavlauncher/src/main/res/layout/activity_pojav_launcher.xml"
          if grep -q '<LinearLayout' "$LAYOUT"; then
            sed -i 's|<LinearLayout\([^>]*\)>|<LinearLayout\1 android:background="@drawable/bg_animated_gradient">|' "$LAYOUT"
          fi
          # 2. Apply RoundedButton style to all buttons
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i 's|<Button |<Button style="@style/RoundedButton" |g' {} \;
          # 3. Ensure text color is primary_text
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i 's|android:textColor="#[^"]*"|android:textColor="@color/primary_text"|g' {} \;
          # 4. Add click animation to buttons (if not already)
          find app_pojavlauncher/src/main/res/layout -name "*.xml" -exec sed -i '/<Button /!s|<Button |<Button android:stateListAnimator="@anim/button_click" |g' {} \;
          echo "✅ Theme reapplied."

      - name: Ensure drawables and colors are present
        run: |
          # Ensure color definitions exist
          if ! grep -q "background_app" app_pojavlauncher/src/main/res/values/colors.xml; then
            cat >> app_pojavlauncher/src/main/res/values/colors.xml << 'EOF'
          <color name="background_app">#E8EEF0</color>
          <color name="background_status_bar">#CFD8DC</color>
          <color name="primary_text">#212121</color>
          <color name="control_button_color">#90A4AE</color>
          <color name="accent_blue">#3F51B5</color>
          EOF
          fi
          # Ensure animated gradient exists
          mkdir -p app_pojavlauncher/src/main/res/drawable
          cat > app_pojavlauncher/src/main/res/drawable/bg_animated_gradient.xml << 'EOF'
          <transition xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@drawable/grad_silver_blue_1" />
              <item android:drawable="@drawable/grad_silver_blue_2" />
          </transition>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/grad_silver_blue_1.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#E8EEF0" android:endColor="#CFD8DC" android:angle="45" android:type="linear"/>
          </shape>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/grad_silver_blue_2.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#CFD8DC" android:endColor="#B0BEC5" android:angle="135" android:type="linear"/>
          </shape>
          EOF
          echo "✅ Drawables created."

      - name: Fix string formatting warnings
        run: |
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i '/<string name="[^"]*">.*%.*%.*</s/<string /<string formatted="false" /' {} \;
          echo "✅ Strings fixed."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/
          git diff --cached --quiet || git commit -m "Restore clean layouts, reapply theme, fix strings"
          git push origin HEAD:${GITHUB_REF_NAME}
