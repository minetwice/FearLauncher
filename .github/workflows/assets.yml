name: Remove Duplicate ic_launcher_background

on:
  push:
    branches:
      - v3_openjdk
      - Fearv2
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. Remove the duplicate line from colors.xml
      - name: Remove ic_launcher_background from colors.xml
        run: |
          sed -i '/ic_launcher_background/d' app_pojavlauncher/src/main/res/values/colors.xml
          echo "✅ Removed ic_launcher_background from colors.xml"

      # 2. Delete the separate ic_launcher_background.xml file
      - name: Delete ic_launcher_background.xml
        run: |
          rm -f app_pojavlauncher/src/main/res/values/ic_launcher_background.xml
          echo "✅ Deleted ic_launcher_background.xml"

      # 3. Add the color back to colors.xml (once)
      - name: Add ic_launcher_background to colors.xml
        run: |
          # Check if it already exists (shouldn't, but just in case)
          if ! grep -q 'ic_launcher_background' app_pojavlauncher/src/main/res/values/colors.xml; then
            sed -i '/<\/resources>/i\    <color name="ic_launcher_background">#1A1A2E</color>' app_pojavlauncher/src/main/res/values/colors.xml
            echo "✅ Added ic_launcher_background to colors.xml"
          else
            echo "ℹ️ ic_launcher_background already in colors.xml"
          fi

      # 4. Commit and push
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/colors.xml
          git add app_pojavlauncher/src/main/res/values/ic_launcher_background.xml
          git diff --cached --quiet || git commit -m "Remove duplicate ic_launcher_background, keep only in colors.xml [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
