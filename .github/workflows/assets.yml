name: Remove Corrupted layout-land & Fix Strings

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Delete all layout-land files
        run: |
          rm -rf app_pojavlauncher/src/main/res/layout-land/*
          # Keep the directory itself (empty) to avoid any path issues
          mkdir -p app_pojavlauncher/src/main/res/layout-land
          echo "✅ Removed all layout-land files."

      - name: Fix string formatting warnings using Python
        run: |
          python3 << 'PYTHON'
          import os, re, glob
          for strings_file in glob.glob("app_pojavlauncher/src/main/res/**/strings.xml", recursive=True):
              with open(strings_file, 'r', encoding='utf-8') as f:
                  content = f.read()
              def add_formatting(match):
                  tag = match.group(0)
                  if 'formatted=' not in tag:
                      text = re.search(r'>(.*?)</string>', tag, re.DOTALL)
                      if text and text.group(1).count('%') > 1:
                          tag = tag.replace('<string ', '<string formatted="false" ', 1)
                  return tag
              pattern = r'<string [^>]*>.*?</string>'
              new_content = re.sub(pattern, add_formatting, content, flags=re.DOTALL)
              if new_content != content:
                  with open(strings_file, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print(f"Fixed: {strings_file}")
          print("✅ Strings fixed.")
          PYTHON

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/layout-land/
          git add app_pojavlauncher/src/main/res/values*/strings.xml
          git diff --cached --quiet || git commit -m "Remove corrupted layout-land files, fix string formatting"
          git push origin HEAD:${GITHUB_REF_NAME}
