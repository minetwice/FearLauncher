name: Restore All Corrupted Layouts & Reapply Theme

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all layout files from MojoLauncher
        run: |
          # List of layout files to restore (add all that we've touched)
          FILES=(
            "activity_basemain.xml"
            "item_centered_textview_large.xml"
            "fragment_local_login.xml"
            "fragment_select_auth_method.xml"
            "fragment_mod_version_list.xml"
            "fragment_file_selector.xml"
            "spinner_mc_version.xml"
            "fragment_profile_type.xml"
            "activity_custom_controls.xml"
            "item_minecraft_account.xml"
            "activity_java_gui_launcher.xml"
            "activity_pojav_launcher.xml"
            "item_version_profile_layout.xml"
            "dialog_control_button_setting.xml"
            "dialog_live_mouse_speed_editor.xml"
            "activity_import_control.xml"
            "dialog_side_dialog.xml"
            "fragment_launcher.xml"
            "fragment_instance_editor.xml"
            "fragment_mod_search.xml"
            "view_progress.xml"
            "item_multirt_runtime.xml"
            "fragment_fabric_install.xml"
            "item_controller_mapping.xml"
          )
          BASE_URL="https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/src/main/res/layout"
          for file in "${FILES[@]}"; do
            curl -s -o "app_pojavlauncher/src/main/res/layout/$file" "$BASE_URL/$file"
            echo "Restored: $file"
          done

      - name: Apply theme changes safely (only to activity_pojav_launcher)
        run: |
          LAYOUT="app_pojavlauncher/src/main/res/layout/activity_pojav_launcher.xml"
          # Add background to the root LinearLayout using a safe method
          sed -i '1s/\(<LinearLayout[^>]*\)/\1 android:background="@drawable\/bg_animated_gradient"/' "$LAYOUT"
          # Also apply button style to all buttons in this layout
          sed -i 's|<Button |<Button style="@style/RoundedButton" |g' "$LAYOUT"
          # Ensure text color is primary_text
          sed -i 's|android:textColor="#[^"]*"|android:textColor="@color/primary_text"|g' "$LAYOUT"
          # Add click animation
          sed -i 's|<Button |<Button android:stateListAnimator="@anim/button_click" |g' "$LAYOUT"

          # Also apply to fragment_launcher and other key fragments
          FRAGMENTS=("fragment_launcher.xml" "fragment_instance_editor.xml")
          for frag in "${FRAGMENTS[@]}"; do
            if [ -f "app_pojavlauncher/src/main/res/layout/$frag" ]; then
              sed -i 's|<Button |<Button style="@style/RoundedButton" |g' "app_pojavlauncher/src/main/res/layout/$frag"
              sed -i 's|android:textColor="#[^"]*"|android:textColor="@color/primary_text"|g' "app_pojavlauncher/src/main/res/layout/$frag"
            fi
          done
          echo "✅ Theme changes reapplied safely."

      - name: Ensure required drawables and colors exist
        run: |
          mkdir -p app_pojavlauncher/src/main/res/drawable
          cat > app_pojavlauncher/src/main/res/drawable/bg_animated_gradient.xml << 'EOF'
          <transition xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@drawable/grad_silver_blue_1" />
              <item android:drawable="@drawable/grad_silver_blue_2" />
          </transition>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/grad_silver_blue_1.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#E8EEF0" android:endColor="#CFD8DC" android:angle="45" android:type="linear"/>
          </shape>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/grad_silver_blue_2.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient android:startColor="#CFD8DC" android:endColor="#B0BEC5" android:angle="135" android:type="linear"/>
          </shape>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/btn_rounded.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/control_button_color"/>
              <corners android:radius="16dp"/>
          </shape>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/btn_ripple.xml << 'EOF'
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/accent_blue">
              <item android:drawable="@drawable/btn_rounded"/>
          </ripple>
          EOF
          echo "✅ Drawables created."

      - name: Fix string formatting warnings
        run: |
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i '/<string name="[^"]*">.*%.*%.*</s/<string /<string formatted="false" /' {} \;
          echo "✅ Strings fixed."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/
          git diff --cached --quiet || git commit -m "Restore all corrupted layouts, reapply theme, add drawables, fix strings"
          git push origin HEAD:${GITHUB_REF_NAME}
