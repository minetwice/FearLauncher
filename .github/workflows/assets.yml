name: Add Missing Divider Styles

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Add ThickDivider and LauncherFragment_Divider to styles.xml
        run: |
          STYLES="app_pojavlauncher/src/main/res/values/styles.xml"
          # Check if styles already exist
          if ! grep -q 'ThickDivider' "$STYLES"; then
            # Insert before </resources>
            sed -i '/<\/resources>/i\
          \    <style name="ThickDivider">\
          \        <item name="android:layout_width">match_parent</item>\
          \        <item name="android:layout_height">2dp</item>\
          \        <item name="android:background">@color/divider</item>\
          \    </style>\
          \
          \    <style name="LauncherFragment_Divider" parent="ThickDivider">\
          \        <item name="android:layout_marginTop">8dp</item>\
          \        <item name="android:layout_marginBottom">8dp</item>\
          \    </style>' "$STYLES"
            echo "✅ Added missing divider styles."
          else
            echo "✅ Divider styles already exist."
          fi

      - name: Fix string formatting warning
        run: |
          sed -i 's/<string name="bind_process_waiting_joystick">/<string formatted="false" name="bind_process_waiting_joystick">/' app_pojavlauncher/src/main/res/values/strings.xml
          echo "✅ String warning fixed."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/styles.xml
          git add app_pojavlauncher/src/main/res/values/strings.xml
          git diff --cached --quiet || git commit -m "Add ThickDivider and LauncherFragment_Divider styles, fix string warning"
          git push origin HEAD:${GITHUB_REF_NAME}
