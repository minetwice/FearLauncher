name: Remove Duplicate ic_launcher_background

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove duplicate ic_launcher_background from colors.xml
        run: |
          sed -i '/ic_launcher_background/d' app_pojavlauncher/src/main/res/values/colors.xml
          echo "✅ Removed ic_launcher_background from colors.xml"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/colors.xml
          git diff --cached --quiet || git commit -m "Remove duplicate ic_launcher_background color definition"
          git push origin HEAD:${GITHUB_REF_NAME}
