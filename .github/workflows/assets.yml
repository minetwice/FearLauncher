name: Fix Missing Resources (Icons & Drawables)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. Create missing ic_setting_sign_in_background vector
      - name: Create ic_setting_sign_in_background
        run: |
          cat > app_pojavlauncher/src/main/res/drawable/ic_setting_sign_in_background.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="@color/icon_outline_color"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10-4.48 10-10S17.52,2 12,2zm-1,17.93c-3.95-0.49-7-3.85-7-7.93 0-0.62,0.08-1.21,0.21-1.79L9,15v1c0,1.1 0.9,2 2,2v1.93zm6.9-2.54c-0.26-0.81-1-1.39-1.9-1.39h-1v-3c0-0.55-0.45-1-1-1H8v-2h2c0.55,0 1-0.45 1-1V7h2c1.1,0 2-0.9 2-2v-0.41c2.93,1.19 5,4.06 5,7.41 0,2.08-0.8,3.97-2.1,5.39z"/>
          </vector>
          EOF
          echo "✅ Created ic_setting_sign_in_background"

      # 2. Create launcher foreground and monochrome vectors
      - name: Create launcher icon vectors
        run: |
          cat > app_pojavlauncher/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#90A4AE"
                  android:pathData="M54,0 L54,0 L54,0 L54,0 L54,0 L54,0 L54,0 L54,0 L54,0 L54,0z"
                  android:strokeColor="#00000000"
                  android:strokeWidth="1"/>
              <path
                  android:fillColor="#455A64"
                  android:pathData="M54,27 C46,27 40,33 40,41 L40,67 C40,75 46,81 54,81 C62,81 68,75 68,67 L68,41 C68,33 62,27 54,27 Z
                  M60,60 L48,60 L48,54 L58,54 L58,48 L48,48 L48,41 L58,41 L58,35 L48,35 L48,60 L42,60 L42,35 L48,35 L48,41 L58,41 L58,48 L48,48 L48,54 L58,54 L58,60 L60,60 Z"
                  android:strokeColor="#00000000"
                  android:strokeWidth="1"/>
          </vector>
          EOF
          cat > app_pojavlauncher/src/main/res/drawable/ic_launcher_monochrome.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,27 C46,27 40,33 40,41 L40,67 C40,75 46,81 54,81 C62,81 68,75 68,67 L68,41 C68,33 62,27 54,27 Z
                  M60,60 L48,60 L48,54 L58,54 L58,48 L48,48 L48,41 L58,41 L58,35 L48,35 L48,60 L42,60 L42,35 L48,35 L48,41 L58,41 L58,48 L48,48 L48,54 L58,54 L58,60 L60,60 Z"/>
          </vector>
          EOF
          echo "✅ Created launcher icon vectors"

      # 3. Update mipmap-anydpi XML files
      - name: Update adaptive icon XMLs
        run: |
          mkdir -p app_pojavlauncher/src/main/res/mipmap-anydpi-v26
          cat > app_pojavlauncher/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
              <monochrome android:drawable="@drawable/ic_launcher_monochrome"/>
          </adaptive-icon>
          EOF
          cat > app_pojavlauncher/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
              <monochrome android:drawable="@drawable/ic_launcher_monochrome"/>
          </adaptive-icon>
          EOF
          if ! grep -q "ic_launcher_background" app_pojavlauncher/src/main/res/values/colors.xml; then
            sed -i '/<\/resources>/i\    <color name="ic_launcher_background">#E8EEF0</color>' app_pojavlauncher/src/main/res/values/colors.xml
          fi
          echo "✅ Updated adaptive icon XMLs"

      # 4. Generate any remaining missing drawables
      - name: Generate remaining drawables
        run: |
          MISSING=(
            "ic_px_hash" "ic_px_zap" "ic_px_file_dl" "ic_px_verify_hash"
            "ic_px_volcano" "ic_microphone" "ic_px_image" "ic_px_gamepad"
            "ic_px_java" "ic_px_alt_sliders" "ic_px_experiment" "ic_px_translate"
            "ic_px_bell" "ic_px_image_renderer" "ic_px_viewport_expand"
            "ic_px_resolution" "ic_px_runtime_mgr" "ic_px_console" "ic_px_ram"
            "ic_px_java_run" "ic_px_nogestures" "ic_px_switch_arrows_x"
            "ic_px_gestures" "ic_px_control_size" "ic_px_letters" "ic_px_pointer_size"
            "ic_px_speed" "ic_px_virtual_mouse" "ic_px_trash" "ic_px_edit"
            "ic_px_book" "ic_px_sharelog" "ic_px_folder" "ic_px_sliders"
            "ic_px_home" "ic_px_arrow_left" "ic_px_file" "ic_filter"
            "ic_add" "ic_gear" "ic_debug" "ic_chat" "ic_keyboard"
            "ic_tab" "ic_mouse" "ic_3rd" "ic_pri" "ic_sec" "ic_gui" "ic_inv"
            "ic_curseforge" "ic_modrinth" "ic_fear_full" "ic_fabric" "ic_quilt"
            "ic_forge" "ic_neoforge" "ic_auth_ms" "ic_auth_elyby"
            "ic_discord" "ic_telegram" "ic_sharp_settings_24" "ic_view_handle"
            "ic_gamepad_pointer" "ic_mouse_pointer" "spinner_arrow" "spinner_arrow_right"
            "notif_icon" "storage_alert" "no_focus_shown"
          )
          for name in "${MISSING[@]}"; do
            if [ ! -f "app_pojavlauncher/src/main/res/drawable/${name}.xml" ]; then
              cat > "app_pojavlauncher/src/main/res/drawable/${name}.xml" << 'EOFVEC'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="@color/icon_outline_color"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10-4.48 10-10S17.52,2 12,2zm0,15c-0.83,0-1.5-0.67-1.5-1.5S11.17,14,12,14s1.5,0.67,1.5,1.5S12.83,17,12,17zm1-4h-2V7h2v6z"/>
          </vector>
          EOFVEC
              echo "Generated: ${name}.xml"
            fi
          done

      # 5. Commit and push
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"   # ✅ FIXED: space
          git add app_pojavlauncher/src/main/res/
          git diff --cached --quiet || git commit -m "Fix missing resources: ic_setting_sign_in_background, launcher icons, and all drawables"
          git push origin HEAD:${GITHUB_REF_NAME}
