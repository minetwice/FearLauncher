name: Analyze PNG Files Usage

on:
  workflow_dispatch:    # Manual trigger from Actions tab

jobs:
  analyze:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate PNG usage report
        run: |
          echo "🔍 Scanning for PNG files and their usage..."
          REPORT="png-usage-report.txt"
          
          echo "=============================================" > $REPORT
          echo "PNG Files Usage Report for FearLauncher" >> $REPORT
          echo "Generated: $(date)" >> $REPORT
          echo "=============================================" >> $REPORT
          echo "" >> $REPORT
          
          # Find all PNG files in the project
          find app_pojavlauncher/src/main/res -type f -name "*.png" | while read png_file; do
            echo "📄 File: $png_file" >> $REPORT
            # Get just the filename without path and extension
            filename=$(basename "$png_file" .png)
            
            # Search for usage in layout XML files
            echo "   🔍 Used in layouts:" >> $REPORT
            grep -r --include="*.xml" "$filename" app_pojavlauncher/src/main/res/layout/ 2>/dev/null | sed 's/^/        - /' >> $REPORT || echo "        (none)" >> $REPORT
            
            # Search for usage in Java/Kotlin files
            echo "   🔍 Used in Java/Kotlin code:" >> $REPORT
            grep -r --include="*.java" --include="*.kt" "$filename" app_pojavlauncher/src/main/java/ 2>/dev/null | sed 's/^/        - /' >> $REPORT || echo "        (none)" >> $REPORT
            
            # Search in any other XML (drawable definitions, etc.)
            echo "   🔍 Used in other XML files:" >> $REPORT
            grep -r --include="*.xml" "$filename" app_pojavlauncher/src/main/res/drawable/ 2>/dev/null | sed 's/^/        - /' >> $REPORT || echo "        (none)" >> $REPORT
            
            # Try to guess purpose based on filename or path
            echo "   📌 Possible purpose:" >> $REPORT
            if [[ "$filename" == *"icon"* ]] || [[ "$filename" == *"logo"* ]]; then
              echo "        - App icon or logo" >> $REPORT
            elif [[ "$filename" == *"btn"* ]] || [[ "$filename" == *"button"* ]]; then
              echo "        - Button background or state drawable" >> $REPORT
            elif [[ "$filename" == *"bg"* ]] || [[ "$filename" == *"background"* ]]; then
              echo "        - Background image for a screen or element" >> $REPORT
            elif [[ "$filename" == *"control"* ]]; then
              echo "        - Custom control (on-screen gamepad buttons)" >> $REPORT
            elif [[ "$filename" == *"notif"* ]]; then
              echo "        - Notification icon" >> $REPORT
            elif [[ "$filename" == *"slider"* ]] || [[ "$filename" == *"thumb"* ]]; then
              echo "        - Slider or seekbar thumb" >> $REPORT
            else
              echo "        - Unknown (check usage above)" >> $REPORT
            fi
            echo "" >> $REPORT
          done
          
          echo "✅ Report generated: $REPORT"
          cat $REPORT

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: png-usage-report
          path: png-usage-report.txt
