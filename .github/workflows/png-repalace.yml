name: Fix styles.xml Syntax

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-styles:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Correctly insert RoundedButton style into styles.xml
        run: |
          STYLES="app_pojavlauncher/src/main/res/values/styles.xml"
          
          # Remove any existing broken RoundedButton style block
          sed -i '/<style name="RoundedButton"/,/<\/style>/d' "$STYLES"
          
          # Ensure the file ends with a newline and has <resources> root
          if ! grep -q "^<resources>" "$STYLES"; then
            echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n</resources>" > "$STYLES"
          fi
          
          # Remove trailing whitespace and ensure </resources> is on its own line
          sed -i 's/[[:space:]]*$//' "$STYLES"
          
          # Insert the new style before the closing </resources> tag
          # Using printf to avoid sed multiline issues
          TEMP_FILE=$(mktemp)
          sed '/<\/resources>/i\
    <style name="RoundedButton" parent="Widget.AppCompat.Button">\
        <item name="android:background">@drawable/btn_silver_ripple</item>\
        <item name="android:textColor">@color/primary_text</item>\
        <item name="android:textSize">14sp</item>\
        <item name="android:padding">12dp</item>\
        <item name="android:minHeight">48dp</item>\
    </style>
    ' "$STYLES" > "$TEMP_FILE"
          
          mv "$TEMP_FILE" "$STYLES"
          echo "✅ Fixed styles.xml"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/styles.xml
          git diff --cached --quiet || git commit -m "Fix styles.xml XML structure"
          git push origin HEAD:${GITHUB_REF_NAME}
