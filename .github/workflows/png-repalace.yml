name: Fix styles.xml Syntax

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-styles:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Fix styles.xml
        run: |
          STYLES="app_pojavlauncher/src/main/res/values/styles.xml"
          
          # Remove any existing RoundedButton style if malformed
          if grep -q '<style name="RoundedButton"' "$STYLES"; then
            sed -i '/<style name="RoundedButton"/,/<\/style>/d' "$STYLES"
          fi
          
          # Ensure proper XML structure
          if ! grep -q "^<resources>" "$STYLES"; then
            echo '<?xml version="1.0" encoding="utf-8"?>' > "$STYLES.new"
            echo '<resources>' >> "$STYLES.new"
            echo '</resources>' >> "$STYLES.new"
            cat "$STYLES" >> "$STYLES.new"
            mv "$STYLES.new" "$STYLES"
          fi
          
          # Insert RoundedButton before </resources>
          sed -i '/<\/resources>/i\
    <style name="RoundedButton" parent="Widget.AppCompat.Button">\
        <item name="android:background">@drawable/btn_silver_ripple</item>\
        <item name="android:textColor">@color/primary_text</item>\
        <item name="android:textSize">14sp</item>\
        <item name="android:padding">12dp</item>\
        <item name="android:minHeight">48dp</item>\
    </style>' "$STYLES"
          
          echo "✅ styles.xml fixed"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/res/values/styles.xml
          git diff --cached --quiet || git commit -m "Fix styles.xml RoundedButton style"
          git push origin HEAD:${GITHUB_REF_NAME}
