name: Fix Submodule URL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-submodule:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout WITHOUT submodules
        uses: actions/checkout@v4
        with:
          submodules: false   # ⬅️ important: submodules fetch nahi karega

      - name: Fix .gitmodules URL
        run: |
          # Replace FearLauncher/glfw with MojoLauncher/glfw
          sed -i 's|https://github.com/FearLauncher/glfw|https://github.com/MojoLauncher/glfw|g' .gitmodules
          # If you have a fork, you can use your own URL:
          # sed -i 's|https://github.com/FearLauncher/glfw|https://github.com/minetwice/glfw|g' .gitmodules
          echo "✅ .gitmodules updated"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .gitmodules
          git diff --cached --quiet || git commit -m "Fix submodule URL: use MojoLauncher/glfw"
          git push origin HEAD:${GITHUB_REF_NAME}
