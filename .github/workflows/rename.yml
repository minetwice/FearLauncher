name: Fix Package Imports

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Fix all Java imports - change fear to mojo
        run: |
          find app_pojavlauncher/src/main/java -type f -name "*.java" -exec sed -i 's/import git\.artdeell\.fear\.R;/import git.artdeell.mojo.R;/g' {} \;
          echo "✅ Fixed imports."

      - name: Also change any hardcoded fear package references
        run: |
          find app_pojavlauncher/src/main/java -type f -name "*.java" -exec sed -i 's/git\.artdeell\.fear/git.artdeell.mojo/g' {} \;
          echo "✅ Fixed other package references."

      - name: Ensure build.gradle uses correct package
        run: |
          sed -i 's/applicationId "git\.artdeell\.fear"/applicationId "git.artdeell.mojo"/g' app_pojavlauncher/build.gradle
          echo "✅ Package in build.gradle fixed."

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/src/main/java/ app_pojavlauncher/build.gradle
          git diff --cached --quiet || git commit -m "Fix package imports: use git.artdeell.mojo"
          git push origin HEAD:${GITHUB_REF_NAME}
