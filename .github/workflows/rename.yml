name: Restore Original Build Files from MojoLauncher

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download original build.gradle from MojoLauncher
        run: |
          # App module build.gradle
          curl -o app_pojavlauncher/build.gradle https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/app_pojavlauncher/build.gradle
          # Root build.gradle (if exists)
          curl -o build.gradle https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/build.gradle
          # Settings.gradle
          curl -o settings.gradle https://raw.githubusercontent.com/MojoLauncher/MojoLauncher/v3_openjdk/settings.gradle
          echo "✅ Downloaded original build files."

      - name: Fix .gitmodules (point to MojoLauncher/glfw)
        run: |
          if [ -f .gitmodules ]; then
            sed -i 's|https://github.com/FearLauncher/glfw|https://github.com/MojoLauncher/glfw|g' .gitmodules
            echo "✅ .gitmodules fixed."
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/build.gradle build.gradle settings.gradle .gitmodules
          git diff --cached --quiet || git commit -m "Restore original build files from MojoLauncher"
          git push origin HEAD:${GITHUB_REF_NAME}
