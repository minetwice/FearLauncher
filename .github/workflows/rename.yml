name: Fix Dependency URLs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-deps:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Replace FearLauncher with MojoLauncher in all build.gradle files
        run: |
          # Fix GitHub URLs
          find . -name "build.gradle" -exec sed -i 's|https://github.com/FearLauncher/|https://github.com/MojoLauncher/|g' {} \;
          # Fix JitPack group IDs
          find . -name "build.gradle" -exec sed -i 's|com.github.FearLauncher|com.github.MojoLauncher|g' {} \;
          # Fix specific dependency paths
          find . -name "build.gradle" -exec sed -i 's|FearLauncher/android-openjdk|MojoLauncher/android-openjdk|g' {} \;
          find . -name "build.gradle" -exec sed -i 's|FearLauncher/caciocavallo|MojoLauncher/caciocavallo|g' {} \;
          echo "✅ Dependency URLs fixed."

      - name: Also check .gitmodules (just in case)
        run: |
          if [ -f .gitmodules ]; then
            sed -i 's|https://github.com/FearLauncher/glfw|https://github.com/MojoLauncher/glfw|g' .gitmodules
            echo "✅ .gitmodules fixed."
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add . **/build.gradle .gitmodules
          git diff --cached --quiet || git commit -m "Fix dependency URLs: revert to MojoLauncher"
          git push origin HEAD:${GITHUB_REF_NAME}
