name: Rename to FearLauncher (With PAT)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Replace all "Mojo" with "Fear" in text files
        run: |
          find . -type f -not -path "./.git/*" -not -name "*.png" -not -name "*.jpg" -not -name "*.jpeg" -not -name "*.gif" -not -name "*.ico" -not -name "*.jar" -not -name "*.zip" -not -name "*.aar" | while read file; do
            if file "$file" | grep -q "text"; then
              sed -i 's/MojoLauncher/FearLauncher/g' "$file"
              sed -i 's/Mojo/Fear/g' "$file"
              sed -i 's/mojo/fear/g' "$file"
            fi
          done
          echo "✅ Rename complete."

      - name: Update package name in build.gradle
        run: |
          find app_pojavlauncher -name "build.gradle" -exec sed -i 's/applicationId "git.artdeell.mojo"/applicationId "com.minetwice.fearlauncher"/g' {} \;
          echo "✅ Package name updated."

      - name: Commit all changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Full rename: Mojo -> Fear (including workflows)"
          git push origin HEAD:${GITHUB_REF_NAME}
