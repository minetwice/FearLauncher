name: FearLauncher CI

on:
  push:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  build:
    name: Build FearLauncher APK
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # ========== POWERFUL REPLACE – Saari jagah MojoLauncher -> FearLauncher ==========
      - name: Force rename all 'MojoLauncher' to 'FearLauncher' in source code
        run: |
          # 1. Sabhi .java, .kt, .xml files mein replace (case-sensitive)
          find app_pojavlauncher/src -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" \) -exec sed -i 's/MojoLauncher/FearLauncher/g' {} \;
          find app_pojavlauncher/src -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" \) -exec sed -i 's/MOJOLAUNCHER/FEARLAUNCHER/g' {} \;
          
          # 2. strings.xml mein app_name, launcher_name etc.
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Fear Launcher</string>|g' {} \;
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i 's|<string name="launcher_name">.*</string>|<string name="launcher_name">Fear Launcher</string>|g' {} \;
          
          # 3. AndroidManifest.xml mein label
          sed -i 's|android:label="[^"]*Mojo[^"]*"|android:label="Fear Launcher"|gi' app_pojavlauncher/src/main/AndroidManifest.xml
          sed -i 's|android:label="@string/app_name"|android:label="Fear Launcher"|g' app_pojavlauncher/src/main/AndroidManifest.xml
          
          # 4. Agar koi Constants file hai toh wahan bhi
          find app_pojavlauncher/src -type f -name "*.java" -exec sed -i 's|public static final String.*DIR.*=.*"MojoLauncher"|public static final String DATA_DIR = "FearLauncher"|g' {} \;
          
      - name: Verify replacement (check if any 'MojoLauncher' remains)
        run: |
          echo "Checking for leftover 'MojoLauncher' strings..."
          if grep -r "MojoLauncher" app_pojavlauncher/src --include="*.java" --include="*.kt" --include="*.xml"; then
            echo "WARNING: Some 'MojoLauncher' strings still exist!"
            echo "Build will continue, but you may need to manually check."
          else
            echo "SUCCESS: All 'MojoLauncher' replaced."
          fi
      # ========================================================================

      - name: Get LTW
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          repo: MojoLauncher/LTW
          workflow: android.yml
          workflow_conclusion: success
          name: output-aar
          path: app_pojavlauncher/libs

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create out directory
        run: mkdir out

      - name: Build Debug APK
        run: |
          gradle :app_pojavlauncher:assembleFullDebug
          mv app_pojavlauncher/build/outputs/apk/full/debug/*.apk out/FearLauncher-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher-debug.apk
