name: FearLauncher CI

on:
  push:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  build:
    name: Build FearLauncher APK
    runs-on: ubuntu-22.04
    env:
      # Secrets – तुम्हारे पास न हों तो भी build चलेगा (सिर्फ release builds में ज़रूरी)
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # ========== NAME & DIRECTORY CHANGE (सबसे पक्का तरीका) ==========
      - name: Change app display name to 'Fear Launcher' everywhere
        run: |
          # 1. सभी strings.xml (हर भाषा में)
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i 's|<string name="app_name">[^<]*</string>|<string name="app_name">Fear Launcher</string>|g' {} \;
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i 's|<string name="launcher_name">[^<]*</string>|<string name="launcher_name">Fear Launcher</string>|g' {} \;
          find app_pojavlauncher/src/main/res -name "strings.xml" -exec sed -i 's|<string name="title_activity_launcher">[^<]*</string>|<string name="title_activity_launcher">Fear Launcher</string>|g' {} \;
          
          # 2. AndroidManifest.xml (मुख्य launcher label)
          sed -i 's|android:label="[^"]*"|android:label="Fear Launcher"|g' app_pojavlauncher/src/main/AndroidManifest.xml
          sed -i 's|android:label="@string/app_name"|android:label="Fear Launcher"|g' app_pojavlauncher/src/main/AndroidManifest.xml
          
          # 3. activity-alias के labels भी
          sed -i 's|<activity-alias[^>]*android:label="[^"]*"|<activity-alias android:label="Fear Launcher"|g' app_pojavlauncher/src/main/AndroidManifest.xml

      - name: Change internal directory from MojoLauncher to FearLauncher
        run: |
          # Java/Kotlin files में सभी जगह
          find app_pojavlauncher/src/main/java -type f \( -name "*.java" -o -name "*.kt" \) -exec sed -i 's|"MojoLauncher"|"FearLauncher"|g' {} \;
          find app_pojavlauncher/src/main/java -type f \( -name "*.java" -o -name "*.kt" \) -exec sed -i "s|'/MojoLauncher'|'/FearLauncher'|g" {} \;
          find app_pojavlauncher/src/main/java -type f \( -name "*.java" -o -name "*.kt" \) -exec sed -i 's|/MojoLauncher/|/FearLauncher/|g' {} \;
          # Constants files में अगर MOJO_DIR हो तो
          find app_pojavlauncher/src/main/java -type f -name "*.java" -exec sed -i 's|MOJO_DIR|FEAR_DIR|g' {} \; 2>/dev/null || true
      # ================================================================

      - name: Get LTW (Lightweight Library – optional)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          repo: MojoLauncher/LTW
          workflow: android.yml
          workflow_conclusion: success
          name: output-aar
          path: app_pojavlauncher/libs

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create out directory
        run: mkdir out

      # ========== BUILD APPS ==========
      - name: Build Debug APK (Full)
        run: |
          gradle :app_pojavlauncher:assembleFullDebug
          mv app_pojavlauncher/build/outputs/apk/full/debug/app_pojavlauncher-full-debug.apk out/FearLauncher-debug-full.apk

      - name: Build Debug APK (No runtime)
        run: |
          gradle :app_pojavlauncher:assembleNoruntimeDebug
          mv app_pojavlauncher/build/outputs/apk/noruntime/debug/app_pojavlauncher-noruntime-debug.apk out/FearLauncher-debug-noruntime.apk

      # ये steps सिर्फ तब चलेंगे जब तुम release बनाना चाहो (अपना GitHub username डालो)
      - name: Build Release AAB (Google Play)
        if: github.repository_owner == 'YourGitHubUsername' && github.ref_name == 'v3_openjdk'
        run: |
          gradle :app_pojavlauncher:bundleFullGplay
          mv app_pojavlauncher/build/outputs/bundle/fullGplay/app_pojavlauncher-full-gplay.aab out/FearLauncher-gplay.aab

      - name: Build Release APK (Nightly)
        if: github.repository_owner == 'YourGitHubUsername' && github.ref_name == 'v3_openjdk'
        run: |
          gradle :app_pojavlauncher:assembleFullPubRelease
          mv app_pojavlauncher/build/outputs/apk/full/pubRelease/app_pojavlauncher-full-pubRelease.apk out/FearLauncher-release.apk

      - name: Generate MD5 checksums
        run: |
          md5sum out/FearLauncher-debug-full.apk > out/FearLauncher-debug-full.md5
          md5sum out/FearLauncher-debug-noruntime.apk > out/FearLauncher-debug-noruntime.md5

      # ========== UPLOAD ARTIFACTS ==========
      - name: Upload Debug APK (Full)
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher-debug-full
          path: out/FearLauncher-debug-full.apk

      - name: Upload Debug APK (No runtime)
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher-debug-noruntime
          path: out/FearLauncher-debug-noruntime.apk

      - name: Upload AAB (if built)
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher-release-aab
          path: out/FearLauncher-gplay.aab

      # GitHub Release – सिर्फ तुम्हारे अपने repo के लिए
      - name: Release Nightly APK
        if: github.repository_owner == 'YourGitHubUsername' && github.ref_name == 'v3_openjdk'
        uses: softprops/action-gh-release@v3
        with:
          name: FearLauncher Nightly Build
          prerelease: true
          tag_name: nightly
          body: |
            FearLauncher nightly build.
            Commit hash: ${{ github.sha }}
          files: |
            out/FearLauncher-release.apk

      # Google Play Upload – इसके लिए SERVICE_JSON secret चाहिए
      - name: Upload to Google Play testing track
        continue-on-error: true
        if: github.repository_owner == 'YourGitHubUsername' && github.ref_name == 'v3_openjdk'
        uses: r0adkll/upload-google-play@v1.1.2
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_JSON }}
          packageName: com.minetwice.fearlauncher   # अपना package name लिखो
          releaseFiles: out/FearLauncher-gplay.aab
          track: internal
          inAppUpdatePriority: 5
